// ─── Сохранение ───────────────────────────────────────────────
function loadSave(){
  try{return JSON.parse(localStorage.getItem(SAVE))||{unlocked:1,stars:{}};}catch(e){return{unlocked:1,stars:{}};}
}
function writeSave(s){localStorage.setItem(SAVE,JSON.stringify(s));}

// ─── Web Audio — простые тоны ─────────────────────────────────
const Sfx=(()=>{
  let ctx=null;
  const ac=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;};
  const tone=(freq,dur=.12,type='sine',vol=.15,ramp=.04)=>{
    try{
      const c=ac(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
      o.type=type;o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur);
    }catch(e){}
  };
  return{
    fire:()=>{tone(180,.18,'square',.12);tone(90,.25,'sawtooth',.08);},
    bounce:()=>tone(420,.08,'triangle',.1),
    coin:()=>{tone(880,.06,'sine',.12);tone(1320,.08,'sine',.08);},
    fart:()=>{tone(120,.2,'sawtooth',.1);tone(80,.15,'square',.06);},
    win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.14,'sine',.1),i*90));},
    lose:()=>{tone(220,.3,'sawtooth',.1);setTimeout(()=>tone(165,.35,'sawtooth',.08),120);},
    ui:()=>tone(660,.05,'sine',.08),
  };
})();

// ─── Генерация мультяшных текстур ────────────────────────────
function makeCanvasTex(scene,key,w,h,draw){
  if(scene.textures.exists(key))return;
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  draw(c.getContext('2d'),w,h);
  scene.textures.addCanvas(key,c);
}

function makeTex(scene,key,w,h,draw){
  if(scene.textures.exists(key))return;
  const g=scene.make.graphics({add:false});
  draw(g,w,h);
  g.generateTexture(key,w,h);
  g.destroy();
}

function bootTextures(scene){
  const outline=(g,x,y,r,col,ol=0x2C1810)=>{
    g.fillStyle(ol);g.fillCircle(x,y,r+2);
    g.fillStyle(col);g.fillCircle(x,y,r);
  };
  const drawTramp=(ctx,w,h,top,bot,rim)=>{
    ctx.fillStyle='#4E342E';
    ctx.beginPath();ctx.ellipse(w/2,h-6,w*.42,7,0,0,Math.PI*2);ctx.fill();
    const g=ctx.createLinearGradient(0,4,0,h-14);
    g.addColorStop(0,top);g.addColorStop(1,bot);
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(10,h-14);
    ctx.bezierCurveTo(10,8,w*.22,4,w/2,6);
    ctx.bezierCurveTo(w*.78,4,w-10,8,w-10,h-14);
    ctx.bezierCurveTo(w-10,h-4,w/2,h-2,10,h-14);
    ctx.fill();
    ctx.strokeStyle=rim;ctx.lineWidth=2.5;ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(18,h-18);ctx.quadraticCurveTo(w/2,h-22,w-18,h-18);ctx.stroke();
  };
  makeCanvasTex(scene,'tramp2',100,44,(ctx,w,h)=>drawTramp(ctx,w,h,'#4DD0E1','#0097A7','#006064'));
  makeCanvasTex(scene,'tramp3',100,44,(ctx,w,h)=>drawTramp(ctx,w,h,'#FFAB91','#FF7043','#BF360C'));
  makeTex(scene,'fan',56,56,(g)=>{
    g.fillStyle(0x2C1810);g.fillRoundedRect(0,0,56,56,8);
    g.fillStyle(0x607D8B);g.fillRoundedRect(3,3,50,50,6);
    g.fillStyle(0xECEFF1);g.fillEllipse(28,28,22,8);
  });
  makeTex(scene,'crow',48,32,(g)=>{
    g.fillStyle(0x111);g.fillEllipse(20,18,26,14);
    g.fillStyle(0xFF9800);g.fillTriangle(34,14,44,16,34,18);
  });
  makeTex(scene,'star',40,40,(g)=>{
    const cx=20,cy=20,outer=16,inner=7;
    g.fillStyle(0xFFD700);g.beginPath();
    for(let i=0;i<10;i++){
      const r=i%2?inner:outer,a=Math.PI/2+i*Math.PI/5;
      g.lineTo(cx+Math.cos(a)*r,cy-Math.sin(a)*r);
    }
    g.closePath();g.fillPath();
    g.lineStyle(2,0xF9A825);g.strokePath();
  });
  makeTex(scene,'cloud',80,40,(g)=>{
    g.fillStyle(0xFFF);
    g.fillEllipse(25,25,22,16);g.fillEllipse(45,22,26,18);g.fillEllipse(60,26,20,14);
  });
  makeTex(scene,'spark',8,8,(g)=>{g.fillStyle(0xFFF);g.fillCircle(4,4,4);});
  makeTex(scene,'dust',6,6,(g)=>{g.fillStyle(0xD7CCC8);g.fillCircle(3,3,3);});
  makeTex(scene,'leaf',12,8,(g)=>{g.fillStyle(0x27AE60);g.fillEllipse(6,4,5,3);});
  makeTex(scene,'tree',48,72,(g)=>{
    g.fillStyle(0x5D4037);g.fillRoundedRect(20,48,8,24,2);
    g.fillStyle(0x2E7D32);g.fillCircle(24,32,22);
    g.fillStyle(0x43A047);g.fillCircle(16,38,14);g.fillCircle(32,38,14);
  });
  makeTex(scene,'bldg',64,120,(g)=>{
    g.fillStyle(0x5D6D7E);g.fillRect(4,20,56,100);
    g.fillStyle(0x34495E);g.fillRect(0,0,64,24);
    for(let r=0;r<4;r++)for(let c=0;c<2;c++)g.fillStyle(0xF9E79F),g.fillRect(12+c*28,32+r*22,16,14);
  });
  makeTex(scene,'palm',56,90,(g)=>{
    g.fillStyle(0x8D6E63);g.fillRoundedRect(24,50,8,40,2);
    g.fillStyle(0x2ECC71);g.fillEllipse(28,28,26,10);g.fillEllipse(28,22,22,8);
  });
  makeTex(scene,'planet',40,40,(g)=>{
    g.fillStyle(0x9B59B6);g.fillCircle(20,20,18);
    g.fillStyle(0xBB8FCE);g.fillEllipse(14,14,8,5);
    g.lineStyle(2,0xE8DAEF,.5);g.strokeCircle(20,20,22);
  });
  makeTex(scene,'fan2',56,56,(g)=>{
    g.fillStyle(0x2C1810);g.fillRoundedRect(0,0,56,56,8);
    g.fillStyle(0xFF5722);g.fillRoundedRect(3,3,50,50,6);
    g.fillStyle(0xFFCCBC);g.fillEllipse(28,28,20,8);
  });
  makeTex(scene,'crow2',48,32,(g)=>{
    g.fillStyle(0x37474F);g.fillEllipse(20,18,26,14);
    g.fillStyle(0xFFC107);g.fillTriangle(34,14,44,16,34,18);
    g.fillStyle(0xFFF);g.fillCircle(28,16,3);
  });
  makeTex(scene,'granny',72,72,(g)=>{
    g.fillStyle(0xFFCCBC);g.fillCircle(36,38,28);
    g.fillStyle(0xB0BEC5);g.fillCircle(36,22,22);
    g.fillStyle(0x222);g.fillCircle(30,38,4);g.fillCircle(42,38,4);
    g.fillStyle(0xE91E63);g.fillRoundedRect(18,50,36,20,8);
    g.fillStyle(0xD32F2F);g.fillTriangle(24,48,48,48,36,58);
  });
  makeTex(scene,'cannon',100,90,(g)=>{
    g.fillStyle(0x5D4037);g.fillRoundedRect(8,68,84,18,6);
    g.fillStyle(0x78909C);g.fillRoundedRect(36,14,28,58,8);
    g.fillStyle(0xFFB300);g.fillCircle(50,14,12);
  });
}

function shrinkTex(scene,key,maxW){
  if(!scene.textures.exists(key))return;
  const img=scene.textures.get(key).getSourceImage();
  if(!img||!img.width)return;
  const sc=Math.min(1,maxW/img.width);
  const w=Math.max(1,Math.round(img.width*sc)),h=Math.max(1,Math.round(img.height*sc));
  const c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  const sm=key+'_sm';
  if(scene.textures.exists(sm))scene.textures.remove(sm);
  scene.textures.addCanvas(sm,c);
}

// ─── Boot ─────────────────────────────────────────────────────
class Boot extends Phaser.Scene{
  constructor(){super('Boot');}
  preload(){
    this.load.on('loaderror',file=>console.warn('asset fail',file&&file.key));
    this.load.image('granny',ASSET_BASE+'assets/granny.png');
    this.load.image('cannon',ASSET_BASE+'assets/cannon.png');
    this.load.image('tramp',ASSET_BASE+'assets/tramp.png');
    this.load.image('coin',ASSET_BASE+'assets/coin.png');
  }
  create(){
    bootTextures(this);
    const ok=k=>this.textures.exists(k)&&!String(this.textures.get(k).key).includes('MISSING');
    if(ok('granny'))shrinkTex(this,'granny',96);
    if(ok('cannon'))shrinkTex(this,'cannon',110);
    if(ok('tramp'))shrinkTex(this,'tramp',100);
    if(ok('coin'))shrinkTex(this,'coin',40);
    if(!this.textures.exists('granny_sm'))shrinkTex(this,'granny',96);
    if(!this.textures.exists('cannon_sm'))shrinkTex(this,'cannon',110);
    this.scene.start('Menu');
  }
}

// ─── Меню ─────────────────────────────────────────────────────
class Menu extends Phaser.Scene{
  constructor(){super('Menu');}
  create(){
    this.drawBg('park');
    this.add.text(W/2,140,'БАБКА НА\nПУШКЕ',{
      fontFamily:FF,fontSize:'52px',fontStyle:'bold',color:'#fff',
      stroke:'#E74C3C',strokeThickness:8,align:'center'
    }).setOrigin(.5);
    const hero=this.add.image(W/2,H*.44,'granny_sm').setScale(2.2).setDepth(5);
    this.tweens.add({targets:hero,y:hero.y-12,duration:1400,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.add.image(W/2+30,H*.56,'cannon_sm').setScale(1.6).setAngle(-8).setDepth(5);
    this.mkBtn(W/2,H-280,'▶  ИГРАТЬ',0x2ECC71,()=>this.scene.start('Levels'));
    this.mkBtn(W/2,H-190,'⭐  УРОВНИ',0x3498DB,()=>this.scene.start('Levels'));
    const s=loadSave();
    const total=Object.values(s.stars).reduce((a,b)=>a+b,0);
    this.add.text(W/2,H-100,`Звёзд: ${total}  |  Уровень ${s.unlocked}/${LEVELS.length}`,{
      fontSize:'20px',color:'#FDFEFE'
    }).setOrigin(.5);
  }
  drawBg(theme){
    const t=THEMES[theme];
    const g=this.add.graphics();
    g.fillGradientStyle(t.sky1,t.sky1,t.sky2,t.sky2,1);
    g.fillRect(0,0,W,H);
    for(let i=0;i<4;i++)this.add.image(100+i*180,80+i*30,'cloud').setAlpha(.7).setScale(.8+i*.1);
  }
  mkBtn(x,y,t,col,fn){
    const r=this.add.rectangle(x,y,260,66,col).setStrokeStyle(4,0x2C1810).setDepth(100).setInteractive({useHandCursor:true});
    const tx=this.add.text(x,y,t,{fontFamily:FF,fontSize:'28px',color:'#fff',fontStyle:'bold'}).setOrigin(.5).setDepth(101);
    r.on('pointerdown',()=>{Sfx.ui();this.tweens.add({targets:[r,tx],scale:.95,duration:60,yoyo:true});fn();});
  }
}

// ─── Выбор уровня ─────────────────────────────────────────────
class Levels extends Phaser.Scene{
  constructor(){super('Levels');}
  create(){
    const t=THEMES.park;
    const g=this.add.graphics();
    g.fillGradientStyle(t.sky1,t.sky1,t.sky2,t.sky2,1);g.fillRect(0,0,W,H);
    this.add.text(W/2,70,'ВЫБЕРИ УРОВЕНЬ',{fontSize:'36px',color:'#fff',fontStyle:'bold',stroke:'#2C3E50',strokeThickness:5}).setOrigin(.5);
    const save=loadSave();
    const cols=3,sw=200,sh=130,gap=16,sx=(W-(cols*sw+(cols-1)*gap))/2+sw/2,sy=160;
    LEVELS.forEach((lv,i)=>{
      const col=i%cols,row=(i/col)|0;
      const x=sx+col*(sw+gap),y=sy+row*(sh+gap);
      const locked=lv.id>save.unlocked;
      const stars=save.stars[lv.id]||0;
      const box=this.add.container(x,y);
      const bg=this.add.graphics();
      bg.fillStyle(locked?0x7F8C8D:0x2ECC71);bg.fillRoundedRect(-sw/2,-sh/2,sw,sh,14);
      bg.lineStyle(3,0x2C1810);bg.strokeRoundedRect(-sw/2,-sh/2,sw,sh,14);
      box.add(bg);
      box.add(this.add.text(0,-30,lv.id,{fontSize:'32px',color:'#fff',fontStyle:'bold'}).setOrigin(.5));
      box.add(this.add.text(0,5,lv.name,{fontSize:'18px',color:'#fff'}).setOrigin(.5));
      box.add(this.add.text(0,35,`🎯 ${lv.goal} м`,{fontSize:'16px',color:'#FDFEFE'}).setOrigin(.5));
      if(locked)box.add(this.add.text(0,0,'🔒',{fontSize:'36px'}).setOrigin(.5));
      else{
        let st='';
        for(let s=0;s<3;s++)st+=s<stars?'⭐':'☆';
        box.add(this.add.text(0,58,st,{fontSize:'16px'}).setOrigin(.5));
        box.setSize(sw,sh).setInteractive({useHandCursor:true}).setDepth(10);
        box.on('pointerdown',()=>{Sfx.ui();this.scene.start('Game',{level:lv.id});});
      }
    });
    this.mkBack();
  }
  mkBack(){
    const b=this.add.text(W/2,H-60,'← Назад',{fontSize:'24px',color:'#fff',backgroundColor:'#34495E',padding:{x:20,y:10}}).setOrigin(.5).setInteractive();
    b.on('pointerdown',()=>this.scene.start('Menu'));
  }
}

// ─── Игра ─────────────────────────────────────────────────────
class Game extends Phaser.Scene{
  constructor(){super('Game');}
  init(data){this.lvId=data.level||1;this.lv=LEVELS.find(l=>l.id===this.lvId)||LEVELS[0];}

  create(){
    this.phase='aim';
    this.drag=false;this.pull=0;this.pullAng=0;
    this.coins=0;this.fartUsed=false;this.groundHit=false;this.stall=0;
    this.flyT=0;this.cd=new Set();this.granny=null;
    this.theme=THEMES[this.lv.theme];

    this.buildWorld();
    this.cannon=this.add.image(CX,CY,'cannon_sm').setOrigin(.5,.88).setDepth(30).setScale(1.15);
    this.sling=this.add.graphics().setDepth(35);

    this.input.setTopOnly(false);
    this.input.addPointer(2);

    this.cameras.main.setBounds(0,0,WORLD_W,H);
    this.cameras.main.scrollX=0;

    this.hudGoal=this.add.text(W/2,18,`🎯 ${this.lv.goal} м`,{fontSize:'24px',color:'#fff',stroke:'#000',strokeThickness:4}).setOrigin(.5).setScrollFactor(0).setDepth(100);
    this.hudDist=this.add.text(16,56,'0 м',{fontSize:'26px',color:'#fff',stroke:'#000',strokeThickness:4}).setScrollFactor(0).setDepth(100);
    this.hudCoin=this.add.text(16,92,'🪙 0',{fontSize:'24px',color:'#FFEB3B',stroke:'#000',strokeThickness:4}).setScrollFactor(0).setDepth(100);
    this.hudLv=this.add.text(W-16,18,`${this.lv.id}. ${this.lv.name}`,{fontSize:'20px',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(1,0).setScrollFactor(0).setDepth(100);
    this.hint=this.add.text(W/2,H-90,'👇 Тяни вниз и отпусти!',{fontSize:'22px',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(.5).setScrollFactor(0).setDepth(100);

    this.btnFart=this.add.text(W-20,H-100,'💨',{fontSize:'48px'}).setOrigin(1,.5).setScrollFactor(0).setDepth(100).setInteractive().setVisible(false);
    this.btnFart.on('pointerdown',(p,...a)=>{if(a[2])a[2].stopPropagation();this.fart();});

    this.input.on('pointerdown',this.pDown,this);
    this.input.on('pointermove',this.pMove,this);
    this.input.on('pointerup',this.pUp,this);
    this.matter.world.on('collisionstart',this.onHit,this);

    this.dustEmitter=this._particles('dust',{speed:{min:20,max:80},angle:{min:250,max:290},scale:{start:.4,end:0},lifespan:400,quantity:6,emitting:false,tint:0xBCAAA4},45);
    this.sparkEmitter=this._particles('spark',{speed:{min:60,max:140},scale:{start:.35,end:0},lifespan:250,quantity:5,emitting:false},55);

    this.showLevelIntro();
  }

  _particles(tex,cfg,depth){
    try{
      return this.add.particles(0,0,tex,cfg).setDepth(depth);
    }catch(e){
      return{explode:()=>{},destroy:()=>{},setScrollFactor:()=>this};
    }
  }

  showLevelIntro(){
    const banner=this.add.container(W/2,H*.35).setScrollFactor(0).setDepth(150).setAlpha(0);
    const bg=this.add.graphics();
    bg.fillStyle(0x000,.55);bg.fillRoundedRect(-220,-50,440,100,16);
    bg.lineStyle(4,0xF1C40F);bg.strokeRoundedRect(-220,-50,440,100,16);
    banner.add(bg);
    const title=this.add.text(0,-12,`Уровень ${this.lv.id}`,{
      fontSize:'28px',color:'#F1C40F',fontStyle:'bold'
    }).setOrigin(.5);
    const sub=this.add.text(0,22,this.lv.name,{
      fontSize:'36px',color:'#fff',fontStyle:'bold',stroke:'#2C3E50',strokeThickness:5
    }).setOrigin(.5);
    banner.add([title,sub]);
    banner.setScale(.6);
    this.tweens.add({
      targets:banner,alpha:1,scale:1,duration:400,ease:'Back.easeOut',
      onComplete:()=>this.time.delayedCall(1200,()=>{
        this.tweens.add({targets:banner,alpha:0,y:banner.y-40,duration:350,onComplete:()=>banner.destroy()});
      })
    });
  }

  buildParallax(){
    const t=this.theme,th=this.lv.theme;
    this.parallax=[];
    const addP=(obj,f)=>{obj.setScrollFactor(f);this.parallax.push({obj,f});return obj;};
    for(let i=0;i<18;i++){
      const x=120+i*440,y=GY-30-Math.sin(i*.7)*20;
      addP(this.add.image(x,y,'cloud').setDepth(1).setAlpha(.45+.1*(i%3)).setScale(.6+(i%4)*.15),0.08);
    }
    if(th==='park'){
      for(let i=0;i<Math.ceil(WORLD_W/280);i++){
        const x=180+i*280+Phaser.Math.Between(-40,40);
        addP(this.add.image(x,GY-18,'tree').setDepth(3).setOrigin(.5,1).setScale(.7+Math.random()*.4),0.25);
      }
      for(let i=0;i<Math.ceil(WORLD_W/200);i++){
        addP(this.add.image(100+i*200,GY-8,'leaf').setDepth(4).setScale(1.2).setAngle(Phaser.Math.Between(-20,20)),0.4);
      }
    }else if(th==='city'){
      for(let i=0;i<Math.ceil(WORLD_W/220);i++){
        const x=80+i*220,h=80+Phaser.Math.Between(0,60);
        addP(this.add.image(x,GY-6,'bldg').setDepth(3).setOrigin(.5,1).setScale(.5+h/120),0.2);
      }
    }else if(th==='beach'){
      for(let i=0;i<Math.ceil(WORLD_W/260);i++){
        addP(this.add.image(140+i*260,GY-10,'palm').setDepth(3).setOrigin(.5,1).setScale(.6+Math.random()*.35),0.22);
      }
    }else{
      for(let i=0;i<Math.ceil(WORLD_W/400);i++){
        addP(this.add.image(200+i*400,200+Phaser.Math.Between(0,120),'planet').setDepth(2).setAlpha(.7).setScale(.5+Math.random()*.5),0.12);
      }
    }
    const hills=this.add.graphics().setDepth(2);
    hills.fillStyle(t.hill,.85);
    for(let x=0;x<WORLD_W+200;x+=120){
      const h=50+Math.sin(x*.012)*30+Math.cos(x*.005)*15;
      hills.fillEllipse(x+60,GY-25,h*.9,h*.45);
    }
    hills.fillStyle(t.hill2,.9);
    for(let x=60;x<WORLD_W+200;x+=100){
      const h=35+Math.cos(x*.015)*22;
      hills.fillEllipse(x+50,GY-12,h*.7,h*.35);
    }
    addP(hills,0.35);
  }

  squashGranny(sx,sy){
    if(!this.granny||!this.granny.sT)return;
    const b=GRANNY_SCALE;
    this.tweens.add({
      targets:this.granny.sT,scaleX:b*sx,scaleY:b*sy,
      duration:70,yoyo:true,ease:'Quad.easeOut'
    });
  }

  magnetCoins(){
    if(!this.granny||this.phase!=='fly')return;
    const tx=this.granny.torso.position.x,ty=this.granny.torso.position.y;
    this.props.filter(p=>p.kind==='coin'&&!p.got).forEach(p=>{
      const dx=tx-p.body.position.x,dy=ty-p.body.position.y,d=Math.hypot(dx,dy);
      if(d<140&&d>8){
        const pull=Math.min(1,(140-d)/140)*.08;
        this.matter.body.setPosition(p.body,{
          x:p.body.position.x+dx*pull,
          y:p.body.position.y+dy*pull
        });
        p.spr.setPosition(p.body.position.x,p.body.position.y);
        if(d<28&&!this.cd.has(p.body.id+'coinMag')){
          this.cd.add(p.body.id+'coinMag');
          const bs=p.spr.coinBase||1;
          this.tweens.add({targets:p.spr,scale:bs*1.15,duration:80,yoyo:true});
        }
      }
    });
  }

  buildWorld(){
    const t=this.theme;
    const sky=this.add.graphics().setDepth(0);
    sky.fillGradientStyle(t.sky1,t.sky1,t.sky2,t.sky2,1);sky.fillRect(0,0,WORLD_W,GY+60);
    this.buildParallax();
    if(this.lv.theme==='space')for(let i=0;i<120;i++){
      const s=this.add.circle(Math.random()*WORLD_W,Math.random()*600,Math.random()*2+1,0xFFF,Math.random()*.5+.3);
      s.setDepth(1).setScrollFactor(Phaser.Math.FloatBetween(.02,.15));
    }
    const grd=this.add.graphics().setDepth(5);
    grd.fillStyle(t.dirt);grd.fillRect(0,GY+4,WORLD_W,60);
    grd.fillStyle(t.ground);grd.fillRect(0,GY-6,WORLD_W,12);
    for(let x=0;x<WORLD_W;x+=80){
      grd.fillStyle(0x000,.06);grd.fillRect(x,GY-4,40,8);
    }

    this.matter.add.rectangle(WORLD_W/2,GY+18,WORLD_W,44,{isStatic:true,label:'ground',friction:.9,restitution:.05});
    this.props=[];this.crows=[];
    this.placeObjects();
  }

  placeObjects(){
    const lv=this.lv;
    const endX=lv.goal*10+800;
    let x=400,ci=0;
    const slots=[];
    while(x<endX){
      slots.push(x);
      x+=Phaser.Math.Between(350,500);
    }
    Phaser.Utils.Array.Shuffle(slots);
    let ti=0,fi=0,cri=0,coi=0;
    for(const sx of slots){
      if(ti<lv.tramps){this.addProp('tramp',sx);ti++;continue;}
      if(fi<lv.fans){this.addProp('fan',sx);fi++;continue;}
      if(cri<lv.crows){this.addProp('crow',sx);cri++;continue;}
      if(coi<lv.coins){this.addProp('coin',sx+Phaser.Math.Between(-40,40));coi++;}
    }
    while(coi<lv.coins){this.addProp('coin',400+coi*120);coi++;}
  }

  addProp(kind,x){
    const pick=(a)=>a[Phaser.Math.Between(0,a.length-1)];
    if(kind==='tramp'){
      const y=GY-8,tex=pick(['tramp','tramp2','tramp3']);
      const b=this.matter.add.rectangle(x,y,80,12,{isStatic:true,label:'tramp',restitution:1.1});
      const s=this.add.image(x,y,tex==='tramp'?'tramp_sm':tex).setDepth(15).setScale(tex==='tramp'?1:1);
      this.props.push({kind,body:b,spr:s});
    }else if(kind==='fan'){
      const y=GY-85,tex=Math.random()<.4?'fan2':'fan';
      const b=this.matter.add.rectangle(x,y,50,50,{isStatic:true,label:'fan'});
      const s=this.add.image(x,y,tex).setDepth(15);
      this.props.push({kind,body:b,spr:s,x,y});
    }else if(kind==='crow'){
      const y=700,tex=Math.random()<.35?'crow2':'crow';
      const b=this.matter.add.circle(x,y,14,{isStatic:true,label:'crow'});
      const s=this.add.image(x,y,tex).setDepth(18);
      this.crows.push({b,s,x,t0:this.time.now});
      this.props.push({kind,body:b,spr:s});
    }else{
      const y=Phaser.Math.Between(GY-220,GY-60);
      const b=this.matter.add.circle(x,y,14,{isStatic:true,isSensor:true,label:'coin'});
      const s=this.add.image(x,y,'coin_sm').setDepth(16).setScale(1);
      s.coinBase=1;
      this.tweens.add({targets:s,y:y-8,duration:600,yoyo:true,repeat:-1});
      this.tweens.add({targets:s,angle:360,duration:3000,repeat:-1});
      this.props.push({kind,body:b,spr:s,got:false});
    }
  }

  muzzle(){
    const a=Phaser.Math.DegToRad(this.cannon.angle-90);
    return{x:CX+Math.cos(a)*BARREL,y:CY+Math.sin(a)*BARREL};
  }
  wpos(p){return{x:p.x+this.cameras.main.scrollX,y:p.y+this.cameras.main.scrollY};}

  spawnGranny(x,y){
    const o={friction:.12,frictionAir:.02,restitution:.32};
    const head=this.matter.add.circle(x,y-26,16,{mass:.8,label:'gH',...o});
    const torso=this.matter.add.rectangle(x,y+2,22,34,{mass:1.5,label:'gT',...o});
    const legs=this.matter.add.rectangle(x,y+30,26,20,{mass:1.7,label:'gL',...o});
    this.matter.add.constraint(head,torso,3,.9,{stiffness:.7,damping:.05});
    this.matter.add.constraint(torso,legs,3,.9,{stiffness:.7,damping:.05});
    const sT=this.add.image(x,y-10,'granny_sm').setDepth(50).setScale(GRANNY_SCALE);
    return{head,torso,legs,sT};
  }

  syncGranny(){
    if(!this.granny||!this.granny.sT)return;
    const t=this.granny.torso;
    this.granny.sT.setPosition(t.position.x,t.position.y-8);
    this.granny.sT.setRotation(t.angle);
  }

  parts(g){return g?[g.head,g.torso,g.legs]:[];}

  pDown(p){
    if(this.phase==='end')return;
    if(this.phase==='fly'){this.fart();return;}
    this.drag=true;this.hint.setVisible(false);this.pMove(p);
  }
  pMove(p){
    if(!this.drag||this.phase!=='aim')return;
    const w=this.wpos(p),m=this.muzzle();
    let dx=m.x-w.x,dy=m.y-w.y,d=Math.min(Math.hypot(dx,dy),MAX_PULL);
    if(d<10){this.pull=0;this.sling.clear();return;}
    const ang=Math.atan2(dy,dx);
    this.pullAng=ang;this.pull=d/MAX_PULL;
    this.cannon.setAngle(Phaser.Math.RadToDeg(ang)+90);
    const g=this.sling;g.clear();
    g.lineStyle(5,0xFF6F00,1);g.lineBetween(m.x,m.y,m.x+Math.cos(ang)*d,m.y+Math.sin(ang)*d);
    g.fillStyle(0xFF6F00);g.fillCircle(m.x+Math.cos(ang)*d,m.y+Math.sin(ang)*d,10);
    g.fillStyle(0x000,.4);g.fillRoundedRect(CX-65,CY-55,130,14,6);
    const c=this.pull<.5?0x2ECC71:this.pull<.8?0xF1C40F:0xE74C3C;
    g.fillStyle(c);g.fillRoundedRect(CX-65,CY-55,130*this.pull,14,6);
  }
  pUp(){
    if(!this.drag||this.phase!=='aim')return;
    this.drag=false;
    if(this.pull<.06){this.sling.clear();return;}
    this.fire();
  }

  fire(){
    this.phase='fly';this.sling.clear();this.groundHit=false;this.stall=0;
    this.flyT=this.time.now;this.fartUsed=false;
    const m=this.muzzle(),spd=20+this.pull*28;
    const vx=Math.cos(this.pullAng)*spd,vy=Math.sin(this.pullAng)*spd;
    this.granny=this.spawnGranny(m.x,m.y);
    this.parts(this.granny).forEach(b=>this.matter.body.setVelocity(b,{x:vx,y:vy}));
    this.cameras.main.shake(120,.008);
    Sfx.fire();
    this.cameras.main.startFollow(this.granny.sT,true,.1,.1,0,-80);
    this.btnFart.setVisible(true);
    const fl=this.add.circle(m.x,m.y,16,0xFFEE58,.9).setDepth(60);
    this.tweens.add({targets:fl,alpha:0,scale:2.5,duration:150,onComplete:()=>fl.destroy()});
    this.sparkEmitter.explode(12,m.x,m.y);
    this.emitter=this.add.particles(0,0,'spark',{
      speed:{min:40,max:100},scale:{start:.5,end:0},lifespan:300,quantity:8,tint:0xFFEE58,emitting:false
    });
    this.emitter.explode(8,m.x,m.y);
  }

  fart(){
    if(this.phase!=='fly'||this.fartUsed||!this.granny)return;
    this.fartUsed=true;this.btnFart.setVisible(false);
    Sfx.fart();
    const t=this.granny.torso,sp=Math.hypot(t.velocity.x,t.velocity.y)||1;
    const bx=t.velocity.x/sp*12,by=t.velocity.y/sp*12;
    this.parts(this.granny).forEach((b,i)=>{
      const k=i===2?1.2:1;
      this.matter.body.setVelocity(b,{x:b.velocity.x+bx*k,y:b.velocity.y+by*k-1});
    });
    this.cameras.main.shake(60,.003);
    const p=this.granny.legs.position;
    for(let i=0;i<4;i++){
      const c=this.add.circle(p.x,p.y,10,0xA5D6A7,.7).setDepth(55);
      this.tweens.add({targets:c,scale:2.5,alpha:0,duration:350,delay:i*40,onComplete:()=>c.destroy()});
    }
    this.dustEmitter.explode(6,p.x,p.y+10);
  }

  onHit(ev){
    if(!this.granny)return;
    ev.pairs.forEach(({bodyA,bodyB})=>{
      const la=bodyA.label,lb=bodyB.label;
      const gp=(la&&la[0]==='g')?bodyA:(lb&&lb[0]==='g')?bodyB:null;
      if(!gp)return;
      const ob=gp===bodyA?bodyB:bodyA,id=ob.id+ob.label;
      if(la==='ground'||lb==='ground'){
        if(!this.groundHit&&gp.velocity.y>2){
          this.dustEmitter.explode(4,gp.position.x,GY-8);
          this.cameras.main.shake(50,.002);
          this.squashGranny(1.25,.75);
          Sfx.bounce();
        }
        this.groundHit=true;
      }
      if((la==='tramp'||lb==='tramp')&&!this.cd.has(id)){
        this.cd.add(id);this.time.delayedCall(300,()=>this.cd.delete(id));
        this.parts(this.granny).forEach(b=>this.matter.body.setVelocity(b,{x:b.velocity.x*1.05,y:-14}));
        const pr=this.props.find(p=>p.body===ob);
        if(pr){
          this.tweens.add({targets:pr.spr,scaleY:.55,scaleX:1.15,duration:80,yoyo:true});
          this.sparkEmitter.explode(8,pr.spr.x,pr.spr.y-10);
          this.cameras.main.shake(100,.006);
          this.squashGranny(.85,1.2);
          Sfx.bounce();
        }
      }
      if((la==='fan'||lb==='fan')&&!this.cd.has(id)){
        this.cd.add(id);this.time.delayedCall(200,()=>this.cd.delete(id));
        this.parts(this.granny).forEach(b=>this.matter.body.setVelocity(b,{x:b.velocity.x+5,y:b.velocity.y-6}));
      }
      if((la==='crow'||lb==='crow')&&!this.cd.has(id)){
        this.cd.add(id);this.time.delayedCall(400,()=>this.cd.delete(id));
        const a=Math.random()*6.28;
        this.parts(this.granny).forEach(b=>this.matter.body.setVelocity(b,{x:b.velocity.x+Math.cos(a)*5,y:b.velocity.y+Math.sin(a)*5}));
      }
      if(la==='coin'||lb==='coin'){
        const cb=la==='coin'?bodyA:bodyB;
        const pr=this.props.find(p=>p.kind==='coin'&&p.body===cb&&!p.got);
        if(pr&&!this.cd.has(id)){
          this.cd.add(id);pr.got=true;this.coins+=10;
          Sfx.coin();
          this.hudCoin.setText('🪙 '+this.coins);
          this.tweens.add({targets:pr.spr,scale:(pr.spr.coinBase||1)*1.8,alpha:0,duration:180,onComplete:()=>{pr.spr.destroy();this.matter.world.remove(pr.body);}});
          this.sparkEmitter.explode(6,pr.spr.x,pr.spr.y);
          const pop=this.add.text(pr.spr.x,pr.spr.y-20,'+10',{fontSize:'22px',color:'#FFEB3B',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(60);
          this.tweens.add({targets:pop,y:pop.y-50,alpha:0,scale:1.3,duration:500,onComplete:()=>pop.destroy()});
        }
      }
    });
  }

  distM(){return this.granny?Math.max(0,((this.granny.torso.position.x-CX)/10)|0):0;}

  win(stars){
    this.phase='end';this.matter.world.pause();this.cameras.main.stopFollow();
    this.btnFart.setVisible(false);
    this.matter.world.off('collisionstart',this.onHit,this);
    Sfx.win();
    const save=loadSave();
    if(this.lv.id+1>save.unlocked&&this.lv.id<LEVELS.length)save.unlocked=this.lv.id+1;
    const prev=save.stars[this.lv.id]||0;
    if(stars>prev)save.stars[this.lv.id]=stars;
    writeSave(save);

    const cx=W/2;
    const overlay=this.add.rectangle(cx,H/2,W,H,0x000,.78).setScrollFactor(0).setDepth(200).setAlpha(0);
    this.tweens.add({targets:overlay,alpha:.78,duration:400});

    const panel=this.add.container(cx,H/2).setScrollFactor(0).setDepth(201).setScale(0);
    const pbg=this.add.graphics();
    pbg.fillStyle(0x2C3E50,.95);pbg.fillRoundedRect(-240,-260,480,520,20);
    pbg.lineStyle(4,0xF1C40F);pbg.strokeRoundedRect(-240,-260,480,520,20);
    panel.add(pbg);
    const title=this.add.text(0,-200,'🎉 УРОВЕНЬ\nПРОЙДЕН!',{
      fontSize:'32px',color:'#F1C40F',fontStyle:'bold',align:'center'
    }).setOrigin(.5);
    panel.add(title);
    const starTxts=[];
    for(let i=0;i<3;i++){
      const st=this.add.text(-50+i*50,-110,i<stars?'⭐':'☆',{fontSize:'44px'}).setOrigin(.5).setScale(0);
      starTxts.push(st);panel.add(st);
    }
    panel.add(this.add.text(0,-40,`Дальность: ${this.distM()} м (цель ${this.lv.goal})`,{fontSize:'22px',color:'#fff'}).setOrigin(.5));
    panel.add(this.add.text(0,0,`Монеты: ${this.coins}`,{fontSize:'22px',color:'#FFEB3B'}).setOrigin(.5));
    this.tweens.add({targets:panel,scale:1,duration:500,ease:'Back.easeOut',delay:150});
    starTxts.forEach((st,i)=>this.time.delayedCall(500+i*180,()=>{
      this.tweens.add({targets:st,scale:1.2,duration:300,ease:'Back.easeOut',onComplete:()=>
        this.tweens.add({targets:st,scale:1,duration:150})});
    }));

    if(this.granny){
      this.tweens.add({targets:this.granny.sT,angle:'+=360',duration:800,ease:'Cubic.easeOut'});
    }

    const confetti=this.add.particles(cx,0,'spark',{
      x:{min:-W/2,max:W/2},speed:{min:80,max:200},angle:{min:240,max:300},
      scale:{start:.5,end:0},lifespan:1200,tint:[0xF1C40F,0xE74C3C,0x2ECC71,0x3498DB],
      quantity:3,frequency:80
    }).setScrollFactor(0).setDepth(199);
    this.time.delayedCall(2500,()=>confetti.destroy());

    this.mkBtn(cx,H/2+60,'Следующий',0x2ECC71,()=>{
      if(this.lv.id<LEVELS.length)this.scene.start('Game',{level:this.lv.id+1});
      else this.scene.start('Levels');
    });
    this.mkBtn(cx,H/2+140,'Уровни',0x3498DB,()=>this.scene.start('Levels'));
    this.mkBtn(cx,H/2+220,'Меню',0x95A5A6,()=>this.scene.start('Menu'));
  }

  lose(){
    this.phase='end';this.matter.world.pause();this.cameras.main.stopFollow();
    this.btnFart.setVisible(false);
    this.matter.world.off('collisionstart',this.onHit,this);
    Sfx.lose();
    this.cameras.main.shake(200,.005);
    const cx=W/2;
    const overlay=this.add.rectangle(cx,H/2,W,H,0x000,.8).setScrollFactor(0).setDepth(200).setAlpha(0);
    this.tweens.add({targets:overlay,alpha:.8,duration:500});

    const panel=this.add.container(cx,H/2).setScrollFactor(0).setDepth(201);
    const fail=this.add.text(0,-80,'Не долетела...',{
      fontSize:'36px',color:'#E74C3C',fontStyle:'bold'
    }).setOrigin(.5).setAlpha(0);
    const dist=this.add.text(0,-20,`${this.distM()} / ${this.lv.goal} м`,{
      fontSize:'28px',color:'#fff'
    }).setOrigin(.5).setAlpha(0);
    panel.add([fail,dist]);
    this.tweens.add({targets:fail,alpha:1,y:-100,duration:400,ease:'Bounce.easeOut',delay:200});
    this.tweens.add({targets:dist,alpha:1,duration:400,delay:400});

    if(this.granny){
      this.tweens.add({targets:this.granny.sT,angle:15,duration:300,yoyo:true,repeat:2});
    }

    this.mkBtn(cx,H/2+40,'Заново',0xE67E22,()=>this.scene.start('Game',{level:this.lv.id}));
    this.mkBtn(cx,H/2+120,'Уровни',0x3498DB,()=>this.scene.start('Levels'));
  }

  mkBtn(x,y,t,col,fn){
    const r=this.add.rectangle(x,y,260,58,col).setScrollFactor(0).setDepth(201).setInteractive();
    const tx=this.add.text(x,y,t,{fontSize:'24px',color:'#fff',fontStyle:'bold'}).setOrigin(.5).setScrollFactor(0).setDepth(202);
    r.on('pointerdown',()=>{Sfx.ui();this.tweens.add({targets:[r,tx],scale:.95,duration:60,yoyo:true});fn();});
  }

  update(time){
    this.crows.forEach(c=>{
      const ny=700+Math.sin((time-c.t0)/350)*42;
      this.matter.body.setPosition(c.b,{x:c.x,y:ny});c.s.setPosition(c.x,ny);
    });
    this.props.filter(p=>p.kind==='fan').forEach(p=>p.spr.setAngle(time/25));

    if(this.granny){
      this.syncGranny();
      this.hudDist.setText(this.distM()+' м');
      if(this.phase==='fly'){
        this.magnetCoins();
        const d=this.distM();
        if(d>=this.lv.goal){
          let stars=1;
          if(d>=this.lv.goal*1.15)stars=2;
          if(d>=this.lv.goal*1.3&&this.coins>=this.lv.coins*6)stars=3;
          this.win(stars);return;
        }
        const tx=this.granny.torso.position.x,ty=this.granny.torso.position.y;
        if(tx>WORLD_W-200||ty<-200){this.lose();return;}
        if(this.groundHit){
          const avg=this.parts(this.granny).reduce((s,b)=>s+Math.hypot(b.velocity.x,b.velocity.y),0)/3;
          if(avg<.4&&time-this.flyT>500){this.stall+=this.game.loop.delta;if(this.stall>800)this.lose();}
          else if(avg>1.2)this.stall=0;
          if(ty<GY-40&&this.granny.torso.velocity.y<0){this.groundHit=false;this.stall=0;}
        }
      }
    }
    this.cameras.main.scrollX=Phaser.Math.Clamp(this.cameras.main.scrollX,0,WORLD_W-W);
  }
}

// ─── Запуск ───────────────────────────────────────────────────
new Phaser.Game({
  type:Phaser.AUTO,width:W,height:H,parent:'game',
  backgroundColor:'#5DADE2',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:'matter',matter:{gravity:{y:1.1},enableSleeping:false}},
  scene:[Boot,Menu,Levels,Game]
});
</script>
</body>
</html>
