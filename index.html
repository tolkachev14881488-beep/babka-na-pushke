<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Бабка на Пушке 3D</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0a1628; touch-action:none; font-family:'Segoe UI',Arial,sans-serif; }
    #canvas-wrap { position:fixed; inset:0; }
    canvas { display:block; width:100%; height:100%; }
    .ui { position:fixed; left:0; right:0; pointer-events:none; z-index:10; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.7); }
    #hud { top:16px; left:16px; font-size:22px; line-height:1.5; }
    #hint { bottom:90px; left:0; right:0; text-align:center; font-size:18px; opacity:.9; }
    .screen { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:linear-gradient(180deg,rgba(10,22,40,.92),rgba(20,50,90,.95)); pointer-events:auto; }
    .screen.hide { display:none; }
    .screen h1 { font-size:clamp(28px,6vw,44px); margin-bottom:8px; text-align:center; color:#fff; }
    .screen .rec { color:#ffd54f; font-size:22px; margin-bottom:32px; }
    .btn { background:linear-gradient(180deg,#66bb6a,#43a047); border:none; color:#fff; font-size:24px; font-weight:bold;
      padding:16px 56px; border-radius:14px; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.4); pointer-events:auto; }
    .btn:active { transform:scale(.96); }
    .btn.sec { background:linear-gradient(180deg,#42a5f5,#1e88e5); margin-top:12px; font-size:20px; padding:12px 40px; }
    #fart-btn { position:fixed; right:20px; bottom:100px; z-index:15; width:72px; height:72px; border-radius:50%;
      background:linear-gradient(180deg,#ab47bc,#7b1fa2); border:3px solid #fff; font-size:28px; display:none;
      pointer-events:auto; box-shadow:0 4px 16px rgba(0,0,0,.5); cursor:pointer; }
    #results p { font-size:22px; color:#e3f2fd; margin:8px 0; text-align:center; }
    #results .big { font-size:32px; color:#ff7043; font-weight:bold; }
  </style>
</head>
<body>
  <div id="canvas-wrap"></div>
  <div id="hud" class="ui hide"><div id="dist">0 м</div><div id="coins">🪙 0</div></div>
  <div id="hint" class="ui hide">👇 Тяни вниз от пушки и отпусти</div>
  <button id="fart-btn" title="Пёрнуть">💨</button>

  <div id="menu" class="screen">
    <h1>🧓 Бабка на Пушке</h1>
    <p class="rec">Рекорд: <span id="rec-val">0</span> м</p>
    <button class="btn" id="play-btn">ИГРАТЬ</button>
  </div>
  <div id="results" class="screen hide">
    <h1>Результат</h1>
    <p class="big" id="res-dist">0 м</p>
    <p id="res-coins">Монеты: 0</p>
    <p id="res-phrase"></p>
    <button class="btn" id="again-btn">Ещё раз</button>
    <button class="btn sec" id="menu-btn">Меню</button>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>
  <script type="module">
    import * as THREE from 'three';

    // ─── Конфиг ─────────────────────────────────────────────
    const CFG = {
      worldLen: 500,
      groundY: 0,
      cannonX: 8,
      maxPull: 12,
      minSpd: 18,
      maxSpd: 42,
      gravity: -14
    };
    const PHRASES = ['Бабка-звезда!','Внучок, я улетела!','Костей не соберёшь!','Ой, спина!'];
    const STORE = 'grannyRecord3d';

    // ─── Рендерер и сцена ───────────────────────────────────
    const wrap = document.getElementById('canvas-wrap');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    wrap.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 40, 280);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 500);
    camera.position.set(-12, 14, 22);
    camera.lookAt(15, 4, 0);

    // ─── Свет ───────────────────────────────────────────────
    scene.add(new THREE.HemisphereLight(0xb3e5fc, 0x558b2f, 0.55));
    const sun = new THREE.DirectionalLight(0xfff5e0, 1.35);
    sun.position.set(-30, 50, 25);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 200;
    sun.shadow.camera.left = -80;
    sun.shadow.camera.right = 120;
    sun.shadow.camera.top = 50;
    sun.shadow.camera.bottom = -10;
    sun.shadow.bias = -0.0003;
    scene.add(sun);

    // ─── Материалы ──────────────────────────────────────────
    const Mat = {
      grass: new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.95 }),
      dirt: new THREE.MeshStandardMaterial({ color: 0x6d4c41, roughness: 1 }),
      wood: new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.85 }),
      woodD: new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.9 }),
      metal: new THREE.MeshStandardMaterial({ color: 0x78909c, metalness: 0.65, roughness: 0.35 }),
      brass: new THREE.MeshStandardMaterial({ color: 0xffb300, metalness: 0.8, roughness: 0.25 }),
      skin: new THREE.MeshStandardMaterial({ color: 0xffccbc, roughness: 0.75 }),
      hair: new THREE.MeshStandardMaterial({ color: 0xb0bec5, roughness: 0.9 }),
      dress: new THREE.MeshStandardMaterial({ color: 0xec407a, roughness: 0.8 }),
      scarf: new THREE.MeshStandardMaterial({ color: 0xd32f2f, roughness: 0.85 }),
      legs: new THREE.MeshStandardMaterial({ color: 0x7e57c2, roughness: 0.8 }),
      boot: new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.7 }),
      tramp: new THREE.MeshStandardMaterial({ color: 0x00e676, roughness: 0.6 }),
      coin: new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.2 }),
      fan: new THREE.MeshStandardMaterial({ color: 0x607d8b, roughness: 0.5, metalness: 0.3 }),
      hill: new THREE.MeshStandardMaterial({ color: 0x66bb6a, roughness: 1 }),
      hill2: new THREE.MeshStandardMaterial({ color: 0x43a047, roughness: 1 }),
      cloud: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, transparent: true, opacity: 0.92 })
    };

    function mesh(geo, mat, cast = true) {
      const m = new THREE.Mesh(geo, mat);
      m.castShadow = cast;
      m.receiveShadow = true;
      return m;
    }

    // ─── Окружение ──────────────────────────────────────────
  const ground = mesh(new THREE.BoxGeometry(CFG.worldLen, 1.2, 40), Mat.grass);
    ground.position.set(CFG.worldLen / 2, -0.6, 0);
    scene.add(ground);
    const dirt = mesh(new THREE.BoxGeometry(CFG.worldLen, 0.8, 40), Mat.dirt, false);
    dirt.position.set(CFG.worldLen / 2, -1.4, 0);
    dirt.receiveShadow = true;
    scene.add(dirt);

    // холмы (декор)
    for (let i = 0; i < 40; i++) {
      const h = mesh(new THREE.ConeGeometry(8 + Math.random() * 12, 6 + Math.random() * 10, 6), i % 2 ? Mat.hill : Mat.hill2, false);
      h.position.set(i * 14 + Math.random() * 8, -0.5, -8 - Math.random() * 6);
      h.rotation.y = Math.random() * Math.PI;
      scene.add(h);
    }
    // облака
    for (let i = 0; i < 15; i++) {
      const c = new THREE.Group();
      for (let j = 0; j < 4; j++) {
        const p = mesh(new THREE.SphereGeometry(1.5 + Math.random(), 10, 8), Mat.cloud, false);
        p.position.set(j * 2 - 3, Math.random() * 0.5, Math.random() * 1.5);
        c.add(p);
      }
      c.position.set(i * 35 + Math.random() * 20, 22 + Math.random() * 8, -15 - Math.random() * 10);
      scene.add(c);
    }

    // ─── 3D Пушка ───────────────────────────────────────────
    function buildCannon() {
      const g = new THREE.Group();
      const carriage = mesh(new THREE.BoxGeometry(3.2, 0.7, 2.2), Mat.woodD);
      carriage.position.y = 0.35;
      g.add(carriage);
      const plank = mesh(new THREE.BoxGeometry(2.8, 0.25, 1.8), Mat.wood);
      plank.position.y = 0.75;
      g.add(plank);
      [[-1, 0.5], [1.6, 0.5]].forEach(([x, z]) => {
        const w = mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.35, 16), Mat.metal);
        w.rotation.z = Math.PI / 2;
        w.position.set(x, 0.55, z);
        g.add(w);
        const rim = mesh(new THREE.TorusGeometry(0.55, 0.06, 8, 20), Mat.metal);
        rim.rotation.y = Math.PI / 2;
        rim.position.set(x, 0.55, z);
        g.add(rim);
      });
      const barrel = mesh(new THREE.CylinderGeometry(0.35, 0.45, 4.5, 16), Mat.metal);
      barrel.rotation.z = Math.PI / 2;
      barrel.position.set(2.2, 1.6, 0);
      g.add(barrel);
      const ring = mesh(new THREE.TorusGeometry(0.5, 0.08, 10, 24), Mat.brass);
      ring.position.set(4.35, 1.6, 0);
      ring.rotation.y = Math.PI / 2;
      g.add(ring);
      const muzzle = mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.3, 12), new THREE.MeshStandardMaterial({ color: 0x212121 }));
      muzzle.rotation.z = Math.PI / 2;
      muzzle.position.set(4.6, 1.6, 0);
      g.add(muzzle);
      g.position.set(CFG.cannonX, 0.8, 0);
      return g;
    }

    const cannon = buildCannon();
    scene.add(cannon);

    // ─── 3D Бабка (составная модель) ────────────────────────
    function buildGrannyMesh() {
      const g = new THREE.Group();
      const headG = new THREE.Group();
      const skull = mesh(new THREE.SphereGeometry(0.42, 20, 16), Mat.skin);
      headG.add(skull);
      const bun = mesh(new THREE.SphereGeometry(0.35, 14, 12), Mat.hair);
      bun.position.set(0, 0.25, -0.15);
      headG.add(bun);
      const glassMat = new THREE.MeshStandardMaterial({ color: 0x37474f, metalness: 0.5, roughness: 0.3 });
      [[-0.18, 0.05], [0.18, 0.05]].forEach(([x, y]) => {
        const ring = mesh(new THREE.TorusGeometry(0.14, 0.02, 8, 20), glassMat);
        ring.position.set(x, y, 0.32);
        headG.add(ring);
        const eye = mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0x111 }));
        eye.position.set(x, y, 0.36);
        headG.add(eye);
      });
      const scarf = mesh(new THREE.ConeGeometry(0.45, 0.25, 12), Mat.scarf);
      scarf.rotation.x = Math.PI;
      scarf.position.set(0, -0.15, 0.1);
      headG.add(scarf);
      g.add(headG);
      g.userData.head = headG;

      const torso = mesh(new THREE.CapsuleGeometry(0.38, 0.7, 8, 16), Mat.dress);
      torso.position.y = -0.75;
      g.add(torso);
      g.userData.torso = torso;

      const legsG = new THREE.Group();
      [[-0.22, 0], [0.22, 0]].forEach(([x, z]) => {
        const leg = mesh(new THREE.CapsuleGeometry(0.16, 0.45, 6, 10), Mat.legs);
        leg.position.set(x, -0.35, z);
        legsG.add(leg);
        const boot = mesh(new THREE.BoxGeometry(0.28, 0.2, 0.38), Mat.boot);
        boot.position.set(x, -0.65, z);
        legsG.add(boot);
      });
      legsG.position.y = -1.15;
      g.add(legsG);
      g.userData.legs = legsG;
      return g;
    }

    // ─── Физика (простая кинематика + ragdoll) ──────────────
    class Body3D {
      constructor(x, y, z = 0) {
        this.pos = new THREE.Vector3(x, y, z);
        this.vel = new THREE.Vector3();
        this.rot = 0;
        this.rotV = 0;
        this.radius = 0.5;
        this.grounded = false;
      }
      step(dt) {
        this.vel.y += CFG.gravity * dt;
        this.pos.addScaledVector(this.vel, dt);
        this.rot += this.rotV * dt;
        this.rotV *= 0.99;
        if (this.pos.y < this.radius) {
          this.pos.y = this.radius;
          if (this.vel.y < 0) {
            this.vel.y *= -0.35;
            this.vel.x *= 0.92;
            this.grounded = Math.abs(this.vel.y) < 1;
          }
        }
      }
    }

    class Ragdoll {
      constructor(x, y) {
        this.head = new Body3D(x, y + 0.9);
        this.head.radius = 0.42;
        this.torso = new Body3D(x, y);
        this.torso.radius = 0.45;
        this.legs = new Body3D(x, y - 0.9);
        this.legs.radius = 0.4;
        this.mesh = buildGrannyMesh();
        this.mesh.visible = false;
        scene.add(this.mesh);
        this.parts = [this.head, this.torso, this.legs];
      }
      launch(vx, vy) {
        this.mesh.visible = true;
        this.parts.forEach(p => { p.vel.set(vx, vy, 0); p.grounded = false; });
      }
      step(dt) {
        this.parts.forEach(p => p.step(dt));
        // constraints (упрощённые пружины)
        this.constrain(this.head, this.torso, 0.85, dt);
        this.constrain(this.torso, this.legs, 0.85, dt);
        // sync mesh
        const h = this.mesh.userData.head;
        const t = this.mesh.userData.torso;
        const l = this.mesh.userData.legs;
        this.mesh.position.copy(this.torso.pos);
        h.position.set(this.head.pos.x - this.torso.pos.x, this.head.pos.y - this.torso.pos.y + 0.75, 0);
        h.rotation.z = this.head.rot;
        t.rotation.z = this.torso.rot;
        l.position.set(this.legs.pos.x - this.torso.pos.x, this.legs.pos.y - this.torso.pos.y - 0.15, 0);
        l.rotation.z = this.legs.rot;
        this.mesh.rotation.y = 0;
      }
      constrain(a, b, dist, dt) {
        const dx = a.pos.x - b.pos.x, dy = a.pos.y - b.pos.y;
        const d = Math.hypot(dx, dy) || 0.01;
        const f = (d - dist) * 28 * dt;
        const nx = dx / d, ny = dy / d;
        a.vel.x -= nx * f; a.vel.y -= ny * f;
        b.vel.x += nx * f; b.vel.y += ny * f;
        a.rotV += (b.rot - a.rot) * 2 * dt;
        b.rotV += (a.rot - b.rot) * 2 * dt;
      }
      boost(fx, fy) {
        this.parts.forEach((p, i) => {
          const k = i === 2 ? 1.2 : 1;
          p.vel.x += fx * k; p.vel.y += fy * k;
        });
      }
      speed() {
        return this.parts.reduce((s, p) => s + p.vel.length(), 0) / 3;
      }
      dispose() { scene.remove(this.mesh); }
    }

    // ─── Объекты мира ───────────────────────────────────────
    const props = [];
    function addTramp(x) {
      const g = new THREE.Group();
      g.add(mesh(new THREE.BoxGeometry(3.5, 0.25, 2), Mat.tramp));
      const frame = mesh(new THREE.BoxGeometry(3.8, 0.15, 2.2), Mat.metal);
      frame.position.y = -0.3;
      g.add(frame);
      g.position.set(x, 0.35, 0);
      scene.add(g);
      props.push({ kind: 'tramp', x, mesh: g, r: 2 });
    }
    function addFan(x) {
      const g = new THREE.Group();
      const box = mesh(new THREE.BoxGeometry(1.8, 1.8, 0.6), Mat.fan);
      g.add(box);
      const blades = new THREE.Group();
      for (let i = 0; i < 4; i++) {
        const b = mesh(new THREE.BoxGeometry(1.4, 0.15, 0.4), new THREE.MeshStandardMaterial({ color: 0xeceff1 }));
        b.rotation.z = i * Math.PI / 2;
        blades.add(b);
      }
      g.add(blades);
      g.userData.blades = blades;
      g.position.set(x, 2.5, 0);
      scene.add(g);
      props.push({ kind: 'fan', x, mesh: g, blades });
    }
    function addCoin(x, y) {
      const c = mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.08, 20), Mat.coin);
      c.rotation.x = Math.PI / 2;
      c.position.set(x, y || 1.5 + Math.random() * 4, 0);
      scene.add(c);
      props.push({ kind: 'coin', x, y: c.position.y, mesh: c, taken: false });
    }
    function buildWorld() {
      let x = 25;
      while (x < CFG.worldLen - 30) {
        const r = Math.random();
        if (r < 0.2) addTramp(x);
        else if (r < 0.35) addFan(x);
        else if (r < 0.65) { const n = 2 + (Math.random() * 3 | 0); for (let i = 0; i < n; i++) addCoin(x + i * 1.8); }
        else addCoin(x);
        x += 12 + Math.random() * 14;
      }
    }
    buildWorld();

    // ─── Игра ───────────────────────────────────────────────
    let phase = 'menu';
    let granny = null;
    let coinCount = 0;
    let fartUsed = false;
    let stall = 0;
    let flyT = 0;
    let dragging = false;
    let pull = 0, pullAng = 0;
    let aimLine = null;
    let trampCd = new Set();

    const slingGeo = new THREE.BufferGeometry();
    const slingMat = new THREE.LineBasicMaterial({ color: 0xff6f00, linewidth: 3 });
    const slingLine = new THREE.Line(slingGeo, slingMat);
    slingLine.visible = false;
    scene.add(slingLine);

    function muzzlePos() {
      const a = cannon.rotation.z;
      const ox = CFG.cannonX, oy = 1.6;
      return new THREE.Vector3(ox + Math.cos(a) * 4.6, oy + Math.sin(a) * 4.6, 0);
    }

    function clearAim() {
      slingLine.visible = false;
      dragging = false;
    }

    function getNDC(e) {
      const r = renderer.domElement.getBoundingClientRect();
      const cx = (e.clientX ?? e.touches?.[0]?.clientX) - r.left;
      const cy = (e.clientY ?? e.touches?.[0]?.clientY) - r.top;
      return {
        x: (cx / r.width) * 2 - 1,
        y: -(cy / r.height) * 2 + 1,
        sx: cx, sy: cy
      };
    }

  const raycaster = new THREE.Raycaster();
    const aimPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // плоскость XY (вид сбоку)
    const hitPt = new THREE.Vector3();

    function screenToWorld(sx, sy) {
      const ndc = getNDC({ clientX: sx, clientY: sy });
      raycaster.setFromCamera(new THREE.Vector2(ndc.x, ndc.y), camera);
      raycaster.ray.intersectPlane(aimPlane, hitPt);
      return hitPt.clone();
    }

    function fire() {
      phase = 'fly';
      clearAim();
      fartUsed = false;
      stall = 0;
      flyT = performance.now();
      document.getElementById('fart-btn').style.display = 'block';

      const m = muzzlePos();
      const spd = CFG.minSpd + pull * (CFG.maxSpd - CFG.minSpd);
      const vx = Math.cos(pullAng) * spd;
      const vy = Math.sin(pullAng) * spd;

      granny = new Ragdoll(m.x, m.y);
      granny.launch(vx, vy);

      // вспышка
      const flash = mesh(new THREE.SphereGeometry(0.5, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffee58 }));
      flash.position.copy(m);
      scene.add(flash);
      setTimeout(() => scene.remove(flash), 120);
    }

    function fart() {
      if (phase !== 'fly' || fartUsed || !granny) return;
      fartUsed = true;
      document.getElementById('fart-btn').style.display = 'none';
      const t = granny.torso.vel;
      const sp = t.length() || 1;
      granny.boost((t.x / sp) * 10, (t.y / sp) * 10 + 2);
      for (let i = 0; i < 4; i++) {
        const s = mesh(new THREE.SphereGeometry(0.25, 8, 8), new THREE.MeshStandardMaterial({ color: 0xa5d6a7, transparent: true, opacity: 0.7 }), false);
        s.position.copy(granny.legs.pos);
        scene.add(s);
        setTimeout(() => scene.remove(s), 400);
      }
    }

    function checkProps() {
      if (!granny) return;
      const px = granny.torso.pos.x, py = granny.torso.pos.y;
      props.forEach(p => {
        if (p.kind === 'coin' && !p.taken && Math.hypot(px - p.x, py - p.y) < 1.2) {
          p.taken = true;
          scene.remove(p.mesh);
          coinCount += 10;
          document.getElementById('coins').textContent = '🪙 ' + coinCount;
        }
        if (p.kind === 'tramp' && Math.abs(px - p.x) < 2 && py < 2.5 && granny.torso.vel.y < 0 && !trampCd.has(p.x)) {
          trampCd.add(p.x);
          setTimeout(() => trampCd.delete(p.x), 400);
          granny.parts.forEach(b => { b.vel.y = 14; b.vel.x *= 1.05; });
          p.mesh.scale.y = 0.6;
          setTimeout(() => p.mesh.scale.y = 1, 150);
        }
        if (p.kind === 'fan' && Math.abs(px - p.x) < 2.5 && Math.abs(py - p.mesh.position.y) < 2.5) {
          granny.parts.forEach(b => { b.vel.x += 0.25; b.vel.y += 0.35; });
        }
      });
    }

    function distM() {
      return granny ? Math.max(0, (granny.torso.pos.x - CFG.cannonX) / 2) | 0 : 0;
    }

    function endRun() {
      if (phase === 'end') return;
      phase = 'end';
      document.getElementById('fart-btn').style.display = 'none';
      document.getElementById('hud').classList.add('hide');
      document.getElementById('hint').classList.add('hide');

      const d = distM();
      const old = parseInt(localStorage.getItem(STORE) || '0');
      if (d > old) localStorage.setItem(STORE, String(d));
      document.getElementById('rec-val').textContent = Math.max(d, old);

      document.getElementById('res-dist').textContent = d + ' м' + (d > old ? ' 🏆' : '');
      document.getElementById('res-coins').textContent = 'Монеты: ' + coinCount;
      document.getElementById('res-phrase').textContent = PHRASES[Math.random() * PHRASES.length | 0];
      document.getElementById('results').classList.remove('hide');
    }

    function resetGame() {
      if (granny) { granny.dispose(); granny = null; }
      coinCount = 0;
      trampCd.clear();
      props.forEach(p => {
        if (p.kind === 'coin' && p.taken) {
          p.taken = false;
          p.mesh.rotation.set(Math.PI / 2, 0, 0);
          p.mesh.position.set(p.x, p.y, 0);
          scene.add(p.mesh);
        }
      });
      cannon.rotation.z = Math.PI / 4;
      camera.position.set(-12, 14, 22);
      document.getElementById('coins').textContent = '🪙 0';
      document.getElementById('dist').textContent = '0 м';
      document.getElementById('results').classList.add('hide');
      document.getElementById('hud').classList.remove('hide');
      document.getElementById('hint').classList.remove('hide');
      document.getElementById('hint').style.opacity = '0.9';
      phase = 'aim';
    }

    // ─── Ввод ───────────────────────────────────────────────
    function onDown(e) {
      e.preventDefault();
      if (phase === 'fly') { fart(); return; }
      if (phase !== 'aim') return;
      dragging = true;
      document.getElementById('hint').style.opacity = '0.4';
      onMove(e);
    }
    function onMove(e) {
      if (!dragging || phase !== 'aim') return;
      e.preventDefault();
      const r = renderer.domElement.getBoundingClientRect();
      const ndc = getNDC(e);
      raycaster.setFromCamera(new THREE.Vector2(ndc.x, ndc.y), camera);
      raycaster.ray.intersectPlane(aimPlane, hitPt);

      const m = muzzlePos();
      let dx = m.x - hitPt.x, dy = m.y - hitPt.y;
      let dist = Math.min(Math.hypot(dx, dy), CFG.maxPull);
      if (dist < 0.5) { pull = 0; slingLine.visible = false; return; }
      pullAng = Math.atan2(dy, dx);
      pull = dist / CFG.maxPull;
      cannon.rotation.z = pullAng;

      const ex = m.x + Math.cos(pullAng) * dist;
      const ey = m.y + Math.sin(pullAng) * dist;
      slingGeo.setFromPoints([m, new THREE.Vector3(ex, ey, 0)]);
      slingLine.visible = true;
    }
    function onUp(e) {
      if (!dragging || phase !== 'aim') return;
      dragging = false;
      if (pull < 0.05) { clearAim(); return; }
      fire();
    }

    renderer.domElement.addEventListener('pointerdown', onDown);
    renderer.domElement.addEventListener('pointermove', onMove);
    renderer.domElement.addEventListener('pointerup', onUp);
    renderer.domElement.addEventListener('pointercancel', onUp);
    document.getElementById('fart-btn').addEventListener('click', e => { e.stopPropagation(); fart(); });

    document.getElementById('play-btn').onclick = () => {
      document.getElementById('menu').classList.add('hide');
      resetGame();
    };
    document.getElementById('again-btn').onclick = () => { resetGame(); };
    document.getElementById('menu-btn').onclick = () => {
      document.getElementById('results').classList.add('hide');
      document.getElementById('hud').classList.add('hide');
      document.getElementById('hint').classList.add('hide');
      document.getElementById('menu').classList.remove('hide');
      phase = 'menu';
      if (granny) { granny.dispose(); granny = null; }
    };

    document.getElementById('rec-val').textContent = localStorage.getItem(STORE) || '0';
    cannon.rotation.z = Math.PI / 4;

    // ─── Цикл ───────────────────────────────────────────────
    let lastT = performance.now();
    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min((now - lastT) / 1000, 0.033);
      lastT = now;

      props.forEach(p => {
        if (p.kind === 'fan' && p.blades) p.blades.rotation.z += dt * 8;
        if (p.kind === 'coin' && !p.taken) p.mesh.rotation.y += dt * 3;
      });

      if (phase === 'fly' && granny) {
        granny.step(dt);
        checkProps();
        document.getElementById('dist').textContent = distM() + ' м';

        const tx = granny.torso.pos.x;
        const ty = granny.torso.pos.y;
        if (tx > CFG.worldLen - 20 || ty < -10) { endRun(); }

        const grounded = granny.parts.some(p => p.grounded);
        if (grounded && granny.speed() < 1.5 && now - flyT > 400) {
          stall += dt * 1000;
          if (stall > 700) endRun();
        } else if (granny.speed() > 3) stall = 0;

        camera.position.x += (tx - 18 - camera.position.x) * 0.07;
        camera.position.y += (8 - camera.position.y) * 0.03;
        camera.lookAt(tx + 10, 4, 0);
      }

      renderer.render(scene, camera);
    }
    animate(performance.now());

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
