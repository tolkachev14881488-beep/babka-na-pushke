<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Бабка на Пушке</title>
  <script>
    window.YaGames = window.YaGames || {
      init() { return Promise.resolve({ adv: this.adv }); },
      share(p) { alert('Поделиться: ' + (p?.title || '')); },
      adv: {
        showRewardedVideo() { return Promise.resolve(); },
        showFullscreenAdv() {}
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#1565c0; touch-action:none; }
    #game-container { width:100%; height:100%; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script>
    // ================================================================
    const W = 720, H = 1280, WORLD_W = 6000;
    const GY = 1210;           // верх земли (трава)
    const GROUND_BODY_Y = GY + 20;
    const CX = 200, CY = GY - 15;  // пушка
    const BARREL = 90;
    const MAX_PULL = 180;
    const STORE = { rec: 'grannyRecord' };

    // ================================================================
    // Рисование в текстуры (один раз — потом как спрайты)
    // ================================================================
    function bakeTexture(scene, key, w, h, draw) {
      if (scene.textures.exists(key)) return;
      const g = scene.make.graphics({ add: false });
      g.clear();
      draw(g, w, h);
      g.generateTexture(key, w, h);
      g.destroy();
    }

    function registerTextures(scene) {
      bakeTexture(scene, 'head', 52, 52, (g) => {
        g.fillStyle(0xb0bec5); g.fillCircle(26, 20, 22);
        g.fillStyle(0xffccbc); g.fillCircle(26, 26, 19);
        g.fillStyle(0xffffff); g.fillCircle(20, 24, 5); g.fillCircle(32, 24, 5);
        g.fillStyle(0x222222); g.fillCircle(21, 24, 2.5); g.fillCircle(33, 24, 2.5);
        g.lineStyle(2, 0x37474f); g.strokeCircle(20, 24, 7); g.strokeCircle(32, 24, 7);
        g.lineStyle(2, 0xc62828); g.beginPath(); g.arc(26, 32, 4, 0.3, Math.PI - 0.3); g.strokePath();
        g.fillStyle(0xd32f2f); g.fillTriangle(12, 16, 40, 16, 26, 28);
      });
      bakeTexture(scene, 'torso', 56, 56, (g) => {
        g.fillStyle(0xec407a); g.fillRoundedRect(10, 8, 36, 40, 8);
        g.fillStyle(0xad1457); [[18,18],[30,24],[16,32],[34,36]].forEach(([x,y]) => g.fillCircle(x, y, 3));
        g.fillStyle(0xffccbc); g.fillRoundedRect(2, 16, 10, 22, 4); g.fillRoundedRect(44, 16, 10, 22, 4);
      });
      bakeTexture(scene, 'legs', 52, 44, (g) => {
        g.fillStyle(0x7e57c2); g.fillRoundedRect(4, 2, 18, 26, 4); g.fillRoundedRect(30, 2, 18, 26, 4);
        g.fillStyle(0x3e2723); g.fillRoundedRect(2, 26, 20, 12, 3); g.fillRoundedRect(28, 26, 20, 12, 3);
      });
      bakeTexture(scene, 'cannon', 100, 120, (g) => {
        g.fillStyle(0x424242); g.fillCircle(22, 100, 16); g.fillCircle(72, 100, 16);
        g.fillStyle(0x6d4c41); g.fillRoundedRect(8, 82, 84, 20, 5);
        g.fillStyle(0x546e7a); g.fillRoundedRect(36, 8, 26, 78, 5);
        g.fillStyle(0xffb300); g.fillCircle(49, 8, 14);
        g.fillStyle(0x212121); g.fillCircle(49, 8, 6);
      });
      bakeTexture(scene, 'tramp', 88, 32, (g) => {
        g.fillStyle(0x455a64); g.fillRect(0, 22, 88, 8);
        g.fillStyle(0x00e676); g.fillRoundedRect(4, 8, 80, 14, 4);
      });
      bakeTexture(scene, 'fan', 52, 52, (g) => {
        g.fillStyle(0x607d8b); g.fillRoundedRect(0, 0, 52, 52, 6);
        g.fillStyle(0xeeeeee); g.fillEllipse(26, 26, 22, 8);
      });
      bakeTexture(scene, 'coin', 28, 28, (g) => {
        g.fillStyle(0xffc107); g.fillCircle(14, 14, 13);
        g.fillStyle(0xffeb3b); g.fillCircle(14, 14, 10);
      });
      bakeTexture(scene, 'crow', 44, 32, (g) => {
        g.fillStyle(0x212121); g.fillEllipse(18, 18, 28, 16);
        g.fillStyle(0xff9800); g.fillTriangle(32, 14, 42, 16, 32, 18);
      });
    }

    // ================================================================
    class BootScene extends Phaser.Scene {
      constructor() { super('Boot'); }
      create() {
        registerTextures(this);
        this.scene.start('Menu');
      }
    }

    class MenuScene extends Phaser.Scene {
      constructor() { super('Menu'); }
      create() {
        this.add.rectangle(W / 2, H / 2, W, H, 0x42a5f5);
        this.add.text(W / 2, 140, 'Бабка на Пушке', {
          fontSize: '48px', fontStyle: 'bold', color: '#fff', stroke: '#0d47a1', strokeThickness: 6
        }).setOrigin(0.5);
        this.add.text(W / 2, 220, 'Рекорд: ' + (localStorage.getItem(STORE.rec) || '0') + ' м', {
          fontSize: '28px', color: '#ffee58'
        }).setOrigin(0.5);
        this.add.image(W / 2, H * 0.5, 'cannon').setScale(1.2);
        this.add.image(W / 2, H * 0.38, 'head');

        const play = this.add.rectangle(W / 2, H - 180, 260, 70, 0x43a047).setInteractive({ useHandCursor: true });
        this.add.text(W / 2, H - 180, 'ИГРАТЬ', { fontSize: '32px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        play.on('pointerdown', () => this.scene.start('Game'));
        this.add.text(W / 2, H - 90, 'Тяни пальцем вниз от пушки → отпусти', {
          fontSize: '18px', color: '#e3f2fd'
        }).setOrigin(0.5);
      }
    }

    class GameScene extends Phaser.Scene {
      constructor() { super('Game'); }

      create() {
        this.phase = 'aim';
        this.dragging = false;
        this.pull = 0;
        this.pullAng = -Math.PI / 4;
        this.coins = 0;
        this.fartUsed = false;
        this.groundHit = false;
        this.stall = 0;
        this.flyT = 0;
        this.cd = new Set();
        this.granny = null;

        // фон
        const sky = this.add.graphics().setDepth(0);
        sky.fillGradientStyle(0x42a5f5, 0x42a5f5, 0xbbe0ff, 0xbbe0ff, 1);
        sky.fillRect(0, 0, WORLD_W, GY + 60);
        const grd = this.add.graphics().setDepth(1);
        grd.fillStyle(0x795548); grd.fillRect(0, GY + 4, WORLD_W, 80);
        grd.fillStyle(0x66bb6a); grd.fillRect(0, GY - 4, WORLD_W, 10);

        this.matter.add.rectangle(WORLD_W / 2, GROUND_BODY_Y, WORLD_W, 44, {
          isStatic: true, label: 'ground', friction: 0.9, restitution: 0.05
        });

        // пушка
        this.cannonSpr = this.add.image(CX, CY, 'cannon').setOrigin(0.45, 0.88).setDepth(30);
        this.aimGfx = this.add.graphics().setDepth(35);
        this.props = [];

        this.buildWorld();
        this.cameras.main.setBounds(0, 0, WORLD_W, H);

        this.lblDist = this.add.text(16, 16, '0 м', {
          fontSize: '28px', color: '#fff', stroke: '#000', strokeThickness: 4
        }).setScrollFactor(0).setDepth(100);
        this.lblCoin = this.add.text(16, 52, '0', {
          fontSize: '26px', color: '#ffee58', stroke: '#000', strokeThickness: 4
        }).setScrollFactor(0).setDepth(100);
        this.lblHint = this.add.text(W / 2, H - 90, '👇 Тяни вниз от пушки', {
          fontSize: '22px', color: '#fff', stroke: '#000', strokeThickness: 3
        }).setOrigin(0.5).setScrollFactor(0).setDepth(100);

        this.btnFart = this.add.text(W - 24, H - 80, '💨', { fontSize: '48px' })
          .setOrigin(1, 0.5).setScrollFactor(0).setDepth(100).setInteractive().setVisible(false);
        this.btnFart.on('pointerdown', (p, lx, ly, ev) => { if (ev) ev.stopPropagation(); this.fart(); });

        this.input.on('pointerdown', this.onDown, this);
        this.input.on('pointermove', this.onMove, this);
        this.input.on('pointerup', this.onUp, this);
        this.matter.world.on('collisionstart', this.onCollide, this);
      }

      muzzle() {
        const rad = Phaser.Math.DegToRad(this.cannonSpr.angle - 90);
        return { x: CX + Math.cos(rad) * BARREL, y: CY + Math.sin(rad) * BARREL };
      }

      wpos(p) {
        const c = this.cameras.main;
        return { x: p.x + c.scrollX, y: p.y + c.scrollY };
      }

      buildWorld() {
        let x = 500;
        while (x < WORLD_W - 300) {
          const r = Phaser.Math.Between(0, 9);
          if (r < 2) this.addProp('tramp', x, GY - 6);
          else if (r < 4) this.addProp('fan', x, GY - 80);
          else if (r < 5) this.addProp('crow', x, 700);
          else { const n = Phaser.Math.Between(2, 4); for (let i = 0; i < n; i++) this.addProp('coin', x + i * 36, Phaser.Math.Between(GY - 220, GY - 60)); }
          x += Phaser.Math.Between(380, 580);
        }
      }

      addProp(kind, x, y) {
        let body, spr;
        if (kind === 'tramp') {
          body = this.matter.add.rectangle(x, y, 80, 12, { isStatic: true, label: 'tramp', restitution: 1.1 });
          spr = this.add.image(x, y, 'tramp').setDepth(15);
        } else if (kind === 'fan') {
          body = this.matter.add.rectangle(x, y, 48, 48, { isStatic: true, label: 'fan' });
          spr = this.add.image(x, y, 'fan').setDepth(15);
        } else if (kind === 'crow') {
          body = this.matter.add.circle(x, y, 14, { isStatic: true, label: 'crow' });
          spr = this.add.image(x, y, 'crow').setDepth(18);
        } else {
          body = this.matter.add.circle(x, y, 14, { isStatic: true, isSensor: true, label: 'coin' });
          spr = this.add.image(x, y, 'coin').setDepth(16);
        }
        this.props.push({ kind, body, spr, x, y, got: false, t0: this.time.now });
      }

      spawnGranny(x, y) {
        const o = { friction: 0.12, frictionAir: 0.02, restitution: 0.3 };
        const head = this.matter.add.circle(x, y - 28, 17, { mass: 0.8, label: 'grannyH', ...o });
        const torso = this.matter.add.rectangle(x, y + 2, 24, 36, { mass: 1.5, label: 'grannyT', ...o });
        const legs = this.matter.add.rectangle(x, y + 32, 28, 22, { mass: 1.7, label: 'grannyL', ...o });
        this.matter.add.constraint(head, torso, 4, 0.9, { stiffness: 0.7, damping: 0.05 });
        this.matter.add.constraint(torso, legs, 4, 0.9, { stiffness: 0.7, damping: 0.05 });

        const sH = this.add.image(x, y, 'head').setDepth(50);
        const sT = this.add.image(x, y, 'torso').setDepth(49);
        const sL = this.add.image(x, y, 'legs').setDepth(48);
        return { head, torso, legs, sH, sT, sL };
      }

      parts(g) { return g ? [g.head, g.torso, g.legs] : []; }
      syncGranny() {
        if (!this.granny) return;
        const g = this.granny;
        const map = [[g.head, g.sH], [g.torso, g.sT], [g.legs, g.sL]];
        map.forEach(([b, s]) => {
          s.setPosition(b.position.x, b.position.y).setRotation(b.angle);
          s.setDepth(40 + (b.position.y | 0));
        });
      }

      onDown(p) {
        if (this.phase === 'end') return;
        if (this.phase === 'fly') { this.fart(); return; }
        this.dragging = true;
        this.lblHint.setVisible(false);
        this.onMove(p);
      }

      onMove(p) {
        if (!this.dragging || this.phase !== 'aim') return;
        const w = this.wpos(p);
        const m = this.muzzle();
        let dx = m.x - w.x, dy = m.y - w.y;
        let dist = Math.min(Math.hypot(dx, dy), MAX_PULL);
        if (dist < 8) { this.pull = 0; this.aimGfx.clear(); return; }
        const ang = Math.atan2(dy, dx);
        this.pull = dist / MAX_PULL;
        this.pullAng = ang;
        this.cannonSpr.setAngle(Phaser.Math.RadToDeg(ang) + 90);

        const fx = m.x + Math.cos(ang) * dist;
        const fy = m.y + Math.sin(ang) * dist;
        const g = this.aimGfx;
        g.clear();
        g.lineStyle(5, 0xff6f00, 1); g.lineBetween(m.x, m.y, fx, fy);
        g.fillStyle(0xff6f00, 1); g.fillCircle(fx, fy, 10);
        g.fillStyle(0x000000, 0.4); g.fillRoundedRect(CX - 65, CY - 50, 130, 14, 5);
        const col = this.pull < 0.5 ? 0x66bb6a : this.pull < 0.8 ? 0xffca28 : 0xef5350;
        g.fillStyle(col, 1); g.fillRoundedRect(CX - 65, CY - 50, 130 * this.pull, 14, 5);
      }

      onUp() {
        if (!this.dragging || this.phase !== 'aim') return;
        this.dragging = false;
        if (this.pull < 0.05) { this.aimGfx.clear(); return; }
        this.fire();
      }

      fire() {
        this.phase = 'fly';
        this.aimGfx.clear();
        this.groundHit = false;
        this.stall = 0;
        this.flyT = this.time.now;
        this.fartUsed = false;

        const m = this.muzzle();
        const spd = 20 + this.pull * 30;
        const vx = Math.cos(this.pullAng) * spd;
        const vy = Math.sin(this.pullAng) * spd;

        this.granny = this.spawnGranny(m.x, m.y);
        this.parts(this.granny).forEach(b => this.matter.body.setVelocity(b, { x: vx, y: vy }));

        this.add.circle(m.x, m.y, 16, 0xffee58, 0.9).setDepth(60)
          .setScale(1).setAlpha(1);
        this.cameras.main.startFollow(this.granny.sT, true, 0.1, 0.1, 0, -80);
        this.btnFart.setVisible(true);
      }

      fart() {
        if (this.phase !== 'fly' || this.fartUsed || !this.granny) return;
        this.fartUsed = true;
        this.btnFart.setVisible(false);
        const t = this.granny.torso;
        const sp = Math.hypot(t.velocity.x, t.velocity.y) || 1;
        const bx = (t.velocity.x / sp) * 14, by = (t.velocity.y / sp) * 14;
        this.parts(this.granny).forEach((b, i) => {
          const k = i === 2 ? 1.2 : 1;
          this.matter.body.setVelocity(b, { x: b.velocity.x + bx * k, y: b.velocity.y + by * k - 1 });
        });
        const p = this.granny.legs.position;
        this.add.circle(p.x, p.y, 14, 0xc8e6c9, 0.7).setDepth(55);
      }

      onCollide(ev) {
        if (!this.granny) return;
        ev.pairs.forEach(({ bodyA, bodyB }) => {
          const la = bodyA.label, lb = bodyB.label;
          const gp = (la && la.startsWith('granny')) ? bodyA : (lb && lb.startsWith('granny')) ? bodyB : null;
          if (!gp) return;
          const ob = gp === bodyA ? bodyB : bodyA;
          const id = ob.id + ob.label;

          if (la === 'ground' || lb === 'ground') this.groundHit = true;

          if ((la === 'tramp' || lb === 'tramp') && !this.cd.has(id)) {
            this.cd.add(id); this.time.delayedCall(300, () => this.cd.delete(id));
            this.parts(this.granny).forEach(b => this.matter.body.setVelocity(b, { x: b.velocity.x * 1.05, y: -14 }));
          }
          if ((la === 'fan' || lb === 'fan') && !this.cd.has(id)) {
            this.cd.add(id); this.time.delayedCall(200, () => this.cd.delete(id));
            this.parts(this.granny).forEach(b => this.matter.body.setVelocity(b, { x: b.velocity.x + 4, y: b.velocity.y - 6 }));
          }
          if ((la === 'crow' || lb === 'crow') && !this.cd.has(id)) {
            this.cd.add(id); this.time.delayedCall(400, () => this.cd.delete(id));
            const a = Math.random() * 6.28;
            this.parts(this.granny).forEach(b => this.matter.body.setVelocity(b, { x: b.velocity.x + Math.cos(a) * 4, y: b.velocity.y + Math.sin(a) * 4 }));
          }
          if (la === 'coin' || lb === 'coin') {
            const coinB = la === 'coin' ? bodyA : bodyB;
            const pr = this.props.find(p => p.kind === 'coin' && p.body === coinB && !p.got);
            if (pr && !this.cd.has(id)) {
              this.cd.add(id); pr.got = true;
              this.coins += 10;
              this.lblCoin.setText(this.coins + ' 🪙');
              pr.spr.destroy();
              this.matter.world.remove(pr.body);
              this.add.text(pr.x, pr.y - 20, '+10', { fontSize: '22px', color: '#ffee58', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5).setDepth(60);
            }
          }
        });
      }

      distM() {
        return this.granny ? Math.max(0, (this.granny.torso.position.x - CX) / 10) : 0;
      }

      endRun() {
        if (this.phase === 'end') return;
        this.phase = 'end';
        this.matter.world.pause();
        this.cameras.main.stopFollow();
        this.btnFart.setVisible(false);
        this.matter.world.off('collisionstart', this.onCollide, this);

        const d = Math.floor(this.distM());
        const old = parseInt(localStorage.getItem(STORE.rec) || '0');
        if (d > old) localStorage.setItem(STORE.rec, String(d));

        this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.75).setScrollFactor(0).setDepth(200);
        this.add.text(W / 2, H / 2 - 120, 'Итог', { fontSize: '40px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0).setDepth(201);
        this.add.text(W / 2, H / 2 - 40, d + ' м  |  🪙 ' + this.coins, { fontSize: '28px', color: '#fff' }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

        const again = this.add.rectangle(W / 2, H / 2 + 60, 240, 56, 0x43a047).setScrollFactor(0).setDepth(201).setInteractive();
        this.add.text(W / 2, H / 2 + 60, 'Ещё раз', { fontSize: '24px', color: '#fff' }).setOrigin(0.5).setScrollFactor(0).setDepth(202);
        again.on('pointerdown', () => this.scene.restart());

        const menu = this.add.rectangle(W / 2, H / 2 + 140, 240, 56, 0x1e88e5).setScrollFactor(0).setDepth(201).setInteractive();
        this.add.text(W / 2, H / 2 + 140, 'Меню', { fontSize: '24px', color: '#fff' }).setOrigin(0.5).setScrollFactor(0).setDepth(202);
        menu.on('pointerdown', () => this.scene.start('Menu'));
      }

      update(time) {
        this.props.forEach(p => {
          if (p.kind === 'crow') {
            const ny = 700 + Math.sin((time - p.t0) / 350) * 40;
            this.matter.body.setPosition(p.body, { x: p.x, y: ny });
            p.spr.setPosition(p.x, ny);
          }
          if (p.kind === 'fan') p.spr.setAngle(time / 30);
          if (p.kind === 'coin' && !p.got) p.spr.setY(p.y + Math.sin(time / 200) * 4);
        });

        if (this.granny) {
          this.syncGranny();
          this.lblDist.setText(Math.floor(this.distM()) + ' м');

          if (this.phase === 'fly') {
            const tx = this.granny.torso.position.x;
            const ty = this.granny.torso.position.y;
            if (tx > WORLD_W - 150 || ty < -200) { this.endRun(); return; }

            if (this.groundHit) {
              const avg = this.parts(this.granny).reduce((s, b) => s + Math.hypot(b.velocity.x, b.velocity.y), 0) / 3;
              if (avg < 0.4 && time - this.flyT > 400) {
                this.stall += this.game.loop.delta;
                if (this.stall > 700) this.endRun();
              } else if (avg > 1.2) this.stall = 0;
              if (ty < GY - 40 && this.granny.torso.velocity.y < 0) { this.groundHit = false; this.stall = 0; }
            }
          }
        }
        this.cameras.main.scrollX = Phaser.Math.Clamp(this.cameras.main.scrollX, 0, WORLD_W - W);
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO,
      width: W, height: H,
      parent: 'game-container',
      backgroundColor: '#42a5f5',
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      physics: {
        default: 'matter',
        matter: { gravity: { y: 1.1 }, enableSleeping: false }
      },
      scene: [BootScene, MenuScene, GameScene]
    });
  </script>
</body>
</html>
