<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#16213e">
  <title>Бабка на Пушке</title>
  <script>
    window.YaGames = window.YaGames || {
      init() { return Promise.resolve({ adv: this.adv, getPlayer: this.getPlayer }); },
      share(p) { alert('Поделиться: ' + (p?.title || '')); },
      adv: {
        showRewardedVideo() { return new Promise(r => { alert('Реклама OK'); r(); }); },
        showFullscreenAdv() {}
      },
      getPlayer() { return Promise.resolve({ setStats() {}, getStats() { return Promise.resolve({}); } }); }
    };
  </script>
  <script src="https://yastatic.net/s3/games-sdk/static/v1/games-sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#16213e;touch-action:none;-webkit-tap-highlight-color:transparent}
    #game-container{width:100%;height:100%}
    #load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#16213e;color:#fff;font-family:Arial;z-index:9;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    #load h2{font-size:26px;margin-bottom:12px}
    #load p{color:#888;font-size:14px}
  </style>
</head>
<body>
  <div id="load"><h2>Бабка на Пушке</h2><p>Загрузка...</p></div>
  <div id="game-container"></div>
  <script>
    YaGames.init().catch(()=>{});

    const W = 720, H = 1280, WORLD_W = 6000;
    const GROUND_Y = 1180;
    const CANNON_X = 180, CANNON_Y = GROUND_Y - 20;
    const LAUNCH_X = CANNON_X;
    const MAX_PULL = 220;
    const MIN_SPEED = 24, MAX_SPEED = 52;

    const STORAGE = { record: 'grannyRecord', runs: 'grannyRunCount' };
    const PHRASES = ['Бабка-звезда!','Внучок, я улетела!','Костей не соберёшь!','Бабка в шоке!','Ой, спина!'];

    // ─── Звук ───────────────────────────────────────────────
    const SFX = {
      ctx: null,
      init() {
        if (this.ctx) { this.ctx.resume(); return; }
        try {
          this.ctx = new (window.AudioContext||window.webkitAudioContext)();
          this.g = this.ctx.createGain(); this.g.gain.value = .3;
          this.g.connect(this.ctx.destination);
        } catch(e){}
      },
      play(freq, dur, type='sine', vol=.2) {
        const c=this.ctx; if(!c)return;
        const o=c.createOscillator(),g=c.createGain();
        o.type=type; o.frequency.value=freq;
        g.gain.setValueAtTime(vol,c.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
        o.connect(g).connect(this.g); o.start(); o.stop(c.currentTime+dur);
      },
      shoot(){this.play(150,.12,'sawtooth',.3);this.play(80,.08,'square',.15)},
      coin(){this.play(900,.08,'sine',.2);setTimeout(()=>this.play(1200,.1,'sine',.15),60)},
      bounce(){this.play(200,.1,'triangle',.2)},
      fart(){this.play(70,.3,'sawtooth',.25)},
      land(){this.play(100,.15,'square',.2)}
    };

    // ─── Рисование (чистый мультяшный стиль) ────────────────
    const Art = {
      sky(g, w, h) {
        g.fillGradientStyle(0x5BA3E8,0x5BA3E8,0xB8E0FF,0xB8E0FF,1);
        g.fillRect(0,0,w,h);
      },
      hills(g, w, y, col) {
        g.fillStyle(col,1);
        for(let x=0;x<w+300;x+=180){
          const ht=60+Math.sin(x*.01)*35;
          g.fillTriangle(x,y,x+90,y-ht,x+180,y);
        }
      },
      ground(g, w) {
        g.fillStyle(0x8B5E3C,1); g.fillRect(0,GROUND_Y,w,120);
        g.fillStyle(0x4CAF50,1); g.fillRect(0,GROUND_Y-6,w,10);
        for(let x=0;x<w;x+=14){
          g.lineStyle(2,0x388E3C,.8);
          g.lineBetween(x,GROUND_Y-6,x+2,GROUND_Y-14-Math.sin(x*.08)*5);
        }
      },
      cannon(g) {
        g.clear();
        // платформа
        g.fillStyle(0x5D4037,1); g.fillRect(-35,0,90,18);
        g.fillStyle(0x795548,1); g.fillRect(-30,-4,80,8);
        // колёса
        [[-20,14,16],[30,14,16]].forEach(([x,y,r])=>{
          g.fillStyle(0x333,1); g.fillCircle(x,y,r);
          g.lineStyle(2,0x555); g.strokeCircle(x,y,r);
        });
        // ствол
        g.fillStyle(0x546E7A,1); g.fillRoundedRect(-8,-90,24,88,4);
        g.fillStyle(0x90A4AE,.7); g.fillRect(-5,-86,6,80);
        g.fillStyle(0xFFB300,1); g.fillCircle(4,-90,12);
        g.fillStyle(0x222,1); g.fillCircle(4,-90,5);
      },
      grannyHead(g) {
        g.clear();
        g.fillStyle(0xBDBDBD,1); g.fillCircle(0,-2,20);
        g.fillStyle(0xFFCCBC,1); g.fillCircle(0,0,17);
        g.fillStyle(0xFFF,1); g.fillCircle(-6,-3,5); g.fillCircle(6,-3,5);
        g.fillStyle(0x222,1); g.fillCircle(-5,-3,2.5); g.fillCircle(7,-3,2.5);
        g.lineStyle(2,0x333); g.strokeCircle(-6,-3,6); g.strokeCircle(6,-3,6);
        g.lineBetween(-1,-3,1,-3);
        g.lineStyle(2,0xC62828); g.beginPath(); g.arc(0,5,4,.3,Math.PI-.3); g.strokePath();
        g.fillStyle(0xC62828,1); g.fillTriangle(-10,-14,10,-14,0,-6);
      },
      grannyBody(g) {
        g.clear();
        g.fillStyle(0xE91E63,1); g.fillRoundedRect(-15,-18,30,38,5);
        [[-5,-8],[5,2],[-3,10],[7,-5]].forEach(([x,y])=>{g.fillStyle(0xAD1457,.6);g.fillCircle(x,y,3);});
        g.fillStyle(0x7B1FA2,1); g.fillRoundedRect(-14,16,12,14,2); g.fillRoundedRect(2,16,12,14,2);
      },
      trampoline(g) {
        g.clear();
        g.fillStyle(0x555,1); g.fillRect(-42,6,84,5);
        for(let i=-3;i<=3;i++){g.lineStyle(2,0x999);let x=i*11;g.beginPath();g.moveTo(x,6);
          for(let j=0;j<3;j++)g.lineTo(x+(j%2?4:-4),6-j*6);g.strokePath();}
        g.fillStyle(0x00E676,1); g.fillRoundedRect(-38,-4,76,12,3);
      },
      fan(g, rot) {
        g.clear();
        g.fillStyle(0x607D8B,1); g.fillRoundedRect(-22,-22,44,44,5);
        g.fillStyle(0x455A64,1); g.fillCircle(0,0,6);
        g.fillStyle(0xCFD8DC,.9);
        for(let i=0;i<4;i++){const a=rot+i*Math.PI/2;g.fillEllipse(Math.cos(a)*12,Math.sin(a)*12,20,7);}
      },
      crow(g, flap) {
        g.clear();
        g.fillStyle(0x212121,1); g.fillEllipse(0,0,26,16);
        g.fillCircle(10,-7,9);
        g.fillStyle(0xFF9800,1); g.fillTriangle(17,-7,24,-5,17,-4);
        g.fillStyle(0x424242,.9);
        g.fillTriangle(-6,0,-20+flap,-10,-16,5);
        g.fillTriangle(6,0,20-flap,-10,16,5);
      },
      coin(g, t) {
        g.clear();
        const s=Math.sin(t*.005)*.15;
        g.fillStyle(0xF9A825,1); g.fillCircle(0,0,11+s*11);
        g.fillStyle(0xFFEB3B,1); g.fillCircle(0,0,9);
        g.fillStyle(0xFFF9C4,.8); g.fillEllipse(-2,-2,4,3);
        g.lineStyle(1.5,0xF57F17); g.strokeCircle(0,0,9);
      }
    };

    function grannyParts(g){return g?[g.head,g.torso,g.legs]:[];}
    function isGranny(b){return b?.label?.startsWith('granny');}

    // ─── Boot ───────────────────────────────────────────────
    class BootScene extends Phaser.Scene {
      constructor(){super('Boot');}
      create(){
        document.getElementById('load').classList.add('hide');
        this.scene.start('Menu');
      }
    }

    // ─── Меню ───────────────────────────────────────────────
    class MenuScene extends Phaser.Scene {
      constructor(){super('Menu');}
      create(){
        const g=this.add.graphics().setScrollFactor(0);
        Art.sky(g,W,H);
        Art.hills(g,W+200,H*.75,0x66BB6A);
        Art.hills(g,W+200,H*.82,0x43A047);
        g.fillStyle(0xFFD54F,.3); g.fillCircle(W-70,90,50); g.fillCircle(W-70,90,35);

        this.add.text(W/2,120,'Бабка на Пушке',{
          fontFamily:'Arial',fontSize:'48px',fontStyle:'bold',color:'#fff',
          stroke:'#1565C0',strokeThickness:6
        }).setOrigin(.5).setScrollFactor(0);

        const rec=parseInt(localStorage.getItem(STORAGE.record)||'0');
        this.add.text(W/2,200,`Рекорд: ${rec} м`,{
          fontFamily:'Arial',fontSize:'28px',color:'#FFD54F'
        }).setOrigin(.5).setScrollFactor(0);

        // кнопка
        const btn=this.add.container(W/2,H-200).setScrollFactor(0);
        const bg=this.add.graphics();
        const drawBtn=(sc=1)=>{
          bg.clear();
          bg.fillStyle(0x000,.25);bg.fillRoundedRect(-130,22,260*sc,66,14);
          bg.fillStyle(0x43A047,1);bg.fillRoundedRect(-130,18,260*sc,66,14);
        };
        drawBtn();
        btn.add(bg);
        btn.add(this.add.text(0,50,'ИГРАТЬ',{fontFamily:'Arial',fontSize:'32px',color:'#fff',fontStyle:'bold'}).setOrigin(.5));
        btn.setSize(260,66).setInteractive({useHandCursor:true});
        btn.on('pointerdown',()=>{drawBtn(.95);this.scene.start('Game');});
        btn.on('pointerup',()=>drawBtn());
        btn.on('pointerout',()=>drawBtn());

        this.add.text(W/2,H-120,'Тяни от пушки → отпускай',{
          fontFamily:'Arial',fontSize:'18px',color:'#aaa'
        }).setOrigin(.5).setScrollFactor(0);

        const runs=parseInt(localStorage.getItem(STORAGE.runs)||'0');
        if(runs>0&&runs%3===0) try{YaGames.adv?.showFullscreenAdv?.();}catch(e){}
      }
    }

    // ─── Игра ───────────────────────────────────────────────
    class GameScene extends Phaser.Scene {
      constructor(){super('Game');}

      create(){
        this.state='aim'; // aim | fly | end
        this.pull={x:0,y:0,power:0};
        this.coins=0; this.fartUsed=false; this.groundHit=false;
        this.stallMs=0; this.hitCd=new Set();
        this.objs=[]; this.crows=[];

        // мир
        const bg=this.add.graphics().setDepth(0);
        Art.sky(bg,WORLD_W,GROUND_Y+100);
        Art.hills(bg,WORLD_W,GROUND_Y-60,0x66BB6A);
        Art.hills(bg,WORLD_W,GROUND_Y-20,0x43A047);
        Art.ground(bg,WORLD_W);
        this.add.circle(400,150,60,0xFFD54F,.25).setDepth(1);

        this.matter.add.rectangle(WORLD_W/2,GROUND_Y+25,WORLD_W,50,{
          isStatic:true,label:'ground',friction:.9,restitution:.08
        });

        // пушка
        this.cannonGfx=this.add.graphics().setDepth(30);
        this.cannonGfx.setPosition(CANNON_X,CANNON_Y);
        Art.cannon(this.cannonGfx);

        this.slingGfx=this.add.graphics().setDepth(35);
        this.grannyGfx=this.add.graphics().setDepth(40);

        this.buildWorld();

        this.cameras.main.setBounds(0,0,WORLD_W,H);
        this.cameras.main.setScroll(0,0);

        // HUD
        this.distTxt=this.add.text(16,16,'0 м',{fontFamily:'Arial',fontSize:'28px',color:'#fff',stroke:'#000',strokeThickness:4}).setScrollFactor(0).setDepth(200);
        this.coinTxt=this.add.text(16,54,'🪙 0',{fontFamily:'Arial',fontSize:'28px',color:'#FFD54F',stroke:'#000',strokeThickness:4}).setScrollFactor(0).setDepth(200);

        // кнопка пёрнуть
        this.fartBtn=this.add.container(W-20,H-100).setScrollFactor(0).setDepth(200).setVisible(false);
        const fb=this.add.graphics();
        fb.fillStyle(0x8E24AA,1);fb.fillRoundedRect(-70,-28,140,56,12);
        this.fartBtn.add(fb);
        this.fartBtn.add(this.add.text(0,0,'💨',{fontSize:'32px'}).setOrigin(.5));
        this.fartBtn.setSize(140,56).setInteractive();
        this.fartBtn.on('pointerdown',e=>{e.stopPropagation();this.doFart();});

        this.hintTxt=this.add.text(W/2,H-80,'Тяни пальцем от пушки',{fontFamily:'Arial',fontSize:'22px',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(.5).setScrollFactor(0).setDepth(200);

        this.input.on('pointerdown',this.onDown,this);
        this.input.on('pointermove',this.onMove,this);
        this.input.on('pointerup',this.onUp,this);
        this.matter.world.on('collisionstart',this.onHit,this);

        localStorage.setItem(STORAGE.runs,String(parseInt(localStorage.getItem(STORAGE.runs)||'0')+1));
      }

      muzzlePos(){
        return{x:CANNON_X+4,y:CANNON_Y-90};
      }

      buildWorld(){
        let x=500;
        while(x<WORLD_W-400){
          const r=Phaser.Math.Between(0,99);
          if(r<18) this.addTramp(x);
          else if(r<32) this.addFan(x);
          else if(r<42) this.addCrow(x);
          else if(r<70){for(let i=0;i<Phaser.Math.Between(2,4);i++)this.addCoin(x+i*40);}
          else this.addCoin(x);
          x+=Phaser.Math.Between(400,650);
        }
      }

      addTramp(x){
        const y=GROUND_Y-14;
        const b=this.matter.add.rectangle(x,y,76,14,{isStatic:true,label:'tramp',restitution:1.1});
        const s=this.add.graphics().setPosition(x,y).setDepth(20);
        Art.trampoline(s);
        this.objs.push({type:'tramp',body:b,gfx:s});
      }
      addFan(x){
        const y=GROUND_Y-100;
        const b=this.matter.add.rectangle(x,y,44,44,{isStatic:true,label:'fan'});
        const s=this.add.graphics().setPosition(x,y).setDepth(20);
        this.objs.push({type:'fan',body:b,gfx:s,x,y});
      }
      addCrow(x){
        const y=700;
        const b=this.matter.add.circle(x,y,14,{isStatic:true,label:'crow'});
        const s=this.add.graphics().setPosition(x,y).setDepth(25);
        this.crows.push({b,s,baseX:x,t0:this.time.now});
        this.objs.push({type:'crow',body:b,gfx:s});
      }
      addCoin(x,y){
        y=y||Phaser.Math.Between(GROUND_Y-280,GROUND_Y-80);
        const b=this.matter.add.circle(x,y,12,{isStatic:true,isSensor:true,label:'coin'});
        const s=this.add.graphics().setPosition(x,y).setDepth(22);
        this.objs.push({type:'coin',body:b,gfx:s,got:false});
      }

      spawnGranny(x,y){
        const o={friction:.15,frictionAir:.02,restitution:.35};
        const head=this.matter.add.circle(x,y-26,17,{mass:.8,label:'grannyHead',...o});
        const torso=this.matter.add.rectangle(x,y+2,22,36,{mass:1.5,label:'grannyTorso',...o});
        const legs=this.matter.add.rectangle(x,y+32,28,26,{mass:1.8,label:'grannyLegs',...o});
        this.matter.add.constraint(head,torso,3,.9,{stiffness:.7,damping:.05});
        this.matter.add.constraint(torso,legs,3,.9,{stiffness:.7,damping:.05});
        const hg=this.add.graphics().setDepth(50);
        const tg=this.add.graphics().setDepth(49);
        const lg=this.add.graphics().setDepth(48);
        Art.grannyHead(hg); Art.grannyBody(tg); Art.grannyBody(lg);
        lg.clear(); lg.fillStyle(0x7B1FA2,1); lg.fillRoundedRect(-14,0,28,18,3);
        return{head,torso,legs,hg,tg,lg};
      }

      syncGranny(){
        if(!this.granny)return;
        const g=this.granny;
        [{b:g.head,s:g.hg},{b:g.torso,s:g.tg},{b:g.legs,s:g.lg}].forEach(({b,s})=>{
          s.setPosition(b.position.x,b.position.y).setRotation(b.angle);
          s.setDepth(40+Math.floor(b.position.y/10));
        });
      }

      worldPt(p){
        const cam=this.cameras.main;
        return{x:p.x+cam.scrollX,y:p.y+cam.scrollY};
      }

      onDown(p){
        SFX.init();
        if(this.state==='fly'){
          if(this.fartBtn.visible&&this.fartBtn.getBounds().contains(p.x,p.y))return;
          this.doFart();return;
        }
        if(this.state!=='aim')return;
        const w=this.worldPt(p);
        const m=this.muzzlePos();
        if(Phaser.Math.Distance.Between(w.x,w.y,m.x,m.y)<350){
          this.dragging=true;
          this.hintTxt.setVisible(false);
        }
      }
      onMove(p){
        if(!this.dragging||this.state!=='aim')return;
        const w=this.worldPt(p);
        const m=this.muzzlePos();
        let dx=m.x-w.x, dy=m.y-w.y;
        const dist=Math.min(Math.hypot(dx,dy),MAX_PULL);
        if(dist<10){this.pull.power=0;this.drawSling(m,m);return;}
        const ang=Math.atan2(dy,dx);
        dx=Math.cos(ang)*dist; dy=Math.sin(ang)*dist;
        this.pull={x:dx,y:dy,power:dist/MAX_PULL,ang};
        this.drawSling(m,{x:m.x+dx,y:m.y+dy});
        // поворот пушки
        const fireAng=Math.atan2(-dy,-dx);
        this.cannonGfx.setRotation(fireAng+Math.PI/2);
      }
      onUp(){
        if(!this.dragging||this.state!=='aim')return;
        this.dragging=false;
        if(this.pull.power<.08)return;
        this.fire();
      }

      drawSling(m,t){
        const g=this.slingGfx;
        g.clear();
        if(this.pull.power<.01)return;
        g.lineStyle(4,0xFF5722,.9);
        g.lineBetween(m.x,m.y,t.x,t.y);
        g.fillStyle(0xFF5722,.8);
        g.fillCircle(t.x,t.y,10);
        // полоска силы
        const bw=120,bh=14,bx=m.x-bw/2,by=m.y-50;
        g.fillStyle(0x000,.5);g.fillRoundedRect(bx,by,bw,bh,6);
        const col=this.pull.power<.5?0x4CAF50:this.pull.power<.8?0xFFC107:0xF44336;
        g.fillStyle(col,1);g.fillRoundedRect(bx,by,bw*this.pull.power,bh,6);
      }

      fire(){
        this.state='fly';
        this.slingGfx.clear();
        this.flyStart=this.time.now;
        this.groundHit=false; this.stallMs=0;

        const m=this.muzzlePos();
        const speed=MIN_SPEED+(MAX_SPEED-MIN_SPEED)*this.pull.power;
        const vx=Math.cos(this.pull.ang)*speed;
        const vy=Math.sin(this.pull.ang)*speed;

        this.granny=this.spawnGranny(m.x,m.y);
        grannyParts(this.granny).forEach(b=>this.matter.body.setVelocity(b,{x:vx,y:vy}));

        SFX.shoot();
        this.cameras.main.shake(100,.004);
        this.cameras.main.startFollow(this.granny.tg,false,.09,.09,0,-80);
        this.fartBtn.setVisible(true);

        // дульная вспышка
        const fl=this.add.circle(m.x,m.y,18,0xFFF176,.9).setDepth(60);
        this.tweens.add({targets:fl,alpha:0,scale:2,duration:150,onComplete:()=>fl.destroy()});
      }

      doFart(){
        if(this.state!=='fly'||this.fartUsed||!this.granny)return;
        this.fartUsed=true;
        this.fartBtn.setVisible(false);
        const g=this.granny;
        const t=g.torso;
        const spd=Math.hypot(t.velocity.x,t.velocity.y)||1;
        const boost=18;
        const fx=t.velocity.x/spd*boost, fy=t.velocity.y/spd*boost;
        grannyParts(g).forEach((b,i)=>{
          const sc=i===2?1.2:1;
          this.matter.body.setVelocity(b,{x:b.velocity.x+fx*sc,y:b.velocity.y+fy*sc-.5});
        });
        SFX.fart();
        this.cameras.main.shake(80,.006);
        const p=g.legs.position;
        for(let i=0;i<4;i++){
          const c=this.add.circle(p.x,p.y,8+i*4,0xC8E6C9,.7).setDepth(55);
          this.tweens.add({targets:c,scale:3,alpha:0,x:p.x-i*15,y:p.y+i*8,duration:400,delay:i*50,onComplete:()=>c.destroy()});
        }
      }

      onHit(ev){
        if(!this.granny)return;
        ev.pairs.forEach(({bodyA,bodyB})=>{
          const la=[bodyA.label,bodyB.label];
          const gp=isGranny(bodyA)?bodyA:isGranny(bodyB)?bodyB:null;
          if(!gp)return;
          const ob=gp===bodyA?bodyB:bodyA;
          const oid=ob.id;

          if(la.includes('ground')){
            this.groundHit=true;
            if(gp.velocity.y>6){
              SFX.land();
              this.cameras.main.shake(150,.008);
            }
          }
          if(la.includes('tramp')&&!this.hitCd.has(oid)){
            this.hitCd.add(oid);this.time.delayedCall(400,()=>this.hitCd.delete(oid));
            grannyParts(this.granny).forEach(b=>{
              this.matter.body.setVelocity(b,{x:b.velocity.x*1.1,y:-16});
            });
            SFX.bounce();
            this.cameras.main.shake(100,.005);
            const o=this.objs.find(x=>x.body===ob);
            if(o)o.gfx.setScale(1,.6);this.time.delayedCall(120,()=>o?.gfx?.setScale(1,1));
          }
          if(la.includes('fan')&&!this.hitCd.has(oid)){
            this.hitCd.add(oid);this.time.delayedCall(300,()=>this.hitCd.delete(oid));
            grannyParts(this.granny).forEach(b=>{
              this.matter.body.setVelocity(b,{x:b.velocity.x+6,y:b.velocity.y-8});
            });
            SFX.bounce();
          }
          if(la.includes('crow')&&!this.hitCd.has(oid)){
            this.hitCd.add(oid);this.time.delayedCall(500,()=>this.hitCd.delete(oid));
            const a=Math.random()*Math.PI*2;
            grannyParts(this.granny).forEach(b=>{
              this.matter.body.setVelocity(b,{x:b.velocity.x+Math.cos(a)*6,y:b.velocity.y+Math.sin(a)*6});
            });
          }
          if(la.includes('coin')){
            const o=this.objs.find(x=>x.type==='coin'&&x.body===ob&&!x.got);
            if(o&&!this.hitCd.has(oid)){
              this.hitCd.add(oid);
              o.got=true;
              this.coins+=10;
              this.coinTxt.setText('🪙 '+this.coins);
              SFX.coin();
              const pop=this.add.text(o.gfx.x,o.gfx.y-20,'+10',{fontSize:'24px',color:'#FFD54F',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(60);
              this.tweens.add({targets:pop,y:pop.y-50,alpha:0,duration:600,onComplete:()=>pop.destroy()});
              this.tweens.add({targets:o.gfx,scale:1.8,alpha:0,duration:200,onComplete:()=>{o.gfx.destroy();this.matter.world.remove(o.body);}});
            }
          }
        });
      }

      getDist(){
        if(!this.granny)return 0;
        return Math.max(0,(this.granny.torso.position.x-LAUNCH_X)/10);
      }

      endGame(){
        if(this.state==='end')return;
        this.state='end';
        this.matter.world.pause();
        this.cameras.main.stopFollow();
        this.fartBtn.setVisible(false);
        this.matter.world.off('collisionstart',this.onHit,this);

        const dist=Math.floor(this.getDist());
        const total=dist+this.coins;
        const old=parseInt(localStorage.getItem(STORAGE.record)||'0');
        const isRec=dist>old;
        if(isRec)localStorage.setItem(STORAGE.record,String(dist));

        const cx=W/2,cy=H/2;
        this.add.rectangle(cx,cy,W,H,0x000,.7).setScrollFactor(0).setDepth(300);
        const panel=this.add.graphics().setScrollFactor(0).setDepth(301);
        panel.fillStyle(0x000,.2);panel.fillRoundedRect(cx-214,cy-284,428,568,16);
        panel.fillStyle(0xFFF,1);panel.fillRoundedRect(cx-220,cy-290,420,560,16);

        this.add.text(cx,cy-220,'Результат',{fontFamily:'Arial',fontSize:'40px',fontStyle:'bold',color:'#333'}).setOrigin(.5).setScrollFactor(0).setDepth(302);
        this.add.text(cx,cy-140,`📏 ${dist} м${isRec?' 🏆':''}`,{fontSize:'30px',color:'#333'}).setOrigin(.5).setScrollFactor(0).setDepth(302);
        this.add.text(cx,cy-90,`🪙 ${this.coins}`,{fontSize:'28px',color:'#333'}).setOrigin(.5).setScrollFactor(0).setDepth(302);
        this.add.text(cx,cy-40,`⭐ ${total}`,{fontSize:'32px',fontStyle:'bold',color:'#E53935'}).setOrigin(.5).setScrollFactor(0).setDepth(302);
        this.add.text(cx,cy+10,Phaser.Utils.Array.GetRandom(PHRASES),{fontSize:'20px',fontStyle:'italic',color:'#888'}).setOrigin(.5).setScrollFactor(0).setDepth(302);

        this.makeBtn(cx,cy+80,'Ещё раз',0x43A047,()=>this.scene.restart());
        this.makeBtn(cx,cy+160,'Меню',0x1E88E5,()=>this.scene.start('Menu'));
        this.makeBtn(cx,cy+240,'Поделиться',0xFB8C00,()=>{
          try{YaGames.share({title:`Бабка пролетела ${dist} м!`,text:'Побей рекорд!',url:location.href});}catch(e){}
        });
      }

      makeBtn(x,y,text,col,cb){
        const c=this.add.container(x,y).setScrollFactor(0).setDepth(302);
        const g=this.add.graphics();
        g.fillStyle(col,1);g.fillRoundedRect(-160,-28,320,56,10);
        c.add(g);
        c.add(this.add.text(0,0,text,{fontFamily:'Arial',fontSize:'24px',color:'#fff'}).setOrigin(.5));
        c.setSize(320,56).setInteractive();
        c.on('pointerdown',cb);
      }

      update(time){
        // вороны
        this.crows.forEach(c=>{
          const y=700+Math.sin((time-c.t0)/400)*45;
          const flap=Math.sin(time/80)*8;
          this.matter.body.setPosition(c.b,{x:c.baseX,y});
          c.s.setPosition(c.baseX,y);
          Art.crow(c.s,flap);
        });
        // вентиляторы
        this.objs.filter(o=>o.type==='fan').forEach(o=>{
          Art.fan(o.gfx,this.time.now/60);
          if(this.state==='fly'&&this.granny){
            const bx=this.granny.torso.position.x,by=this.granny.torso.position.y;
            if(Math.abs(bx-o.x)<60&&Math.abs(by-o.y)<80){
              grannyParts(this.granny).forEach(b=>{
                this.matter.body.setVelocity(b,{x:b.velocity.x+.15,y:b.velocity.y-.2});
              });
            }
          }
        });
        // монеты
        this.objs.filter(o=>o.type==='coin'&&!o.got).forEach(o=>Art.coin(o.gfx,time));

        if(this.granny){
          this.syncGranny();
          this.distTxt.setText(Math.floor(this.getDist())+' м');

          if(this.state==='fly'){
            const tx=this.granny.torso.position.x, ty=this.granny.torso.position.y;
            if(tx>WORLD_W-200||ty<-300){this.endGame();return;}

            if(this.groundHit){
              const parts=grannyParts(this.granny);
              const spd=parts.reduce((s,b)=>s+Math.hypot(b.velocity.x,b.velocity.y),0)/3;
              if(spd<.4&&(time-this.flyStart)>600){
                this.stallMs+=this.game.loop.delta;
                if(this.stallMs>900)this.endGame();
              }else this.stallMs=0;
            }
          }
        }
      }
    }

    new Phaser.Game({
      type:Phaser.AUTO,width:W,height:H,parent:'game-container',
      backgroundColor:'#5BA3E8',
      scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
      physics:{
        default:'matter',
        matter:{gravity:{y:1.15},enableSleeping:false,positionIterations:10,velocityIterations:8}
      },
      scene:[BootScene,MenuScene,GameScene]
    });
  </script>
</body>
</html>
