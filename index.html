<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Бабка на Пушке</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>
  <style>
    *{margin:0;padding:0} html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;touch-action:none}
    #game{width:100%;height:100%}
  </style>
</head>
<body>
<div id="game"></div>
<script>
const W=720,H=1280;
const GY=1140,CX=140,CY=GY-60;
const BARREL=72,MAX_PULL=240,PX_PER_M=10;
const SAVE='babkaSave';
const FF="'Fredoka',Arial,sans-serif";
const ASSET_BASE=(()=>{
  const p=location.pathname;
  if(p.endsWith('.html'))return p.slice(0,p.lastIndexOf('/')+1);
  return p.endsWith('/')?p:p+'/';
})();

const LEVELS=[
  {id:1,name:'Двор',goal:45,theme:'park',coins:4,tramps:1},
  {id:2,name:'Аллея',goal:70,theme:'park',coins:5,tramps:2},
  {id:3,name:'Парк',goal:95,theme:'park',coins:6,tramps:2},
  {id:4,name:'Город',goal:120,theme:'city',coins:7,tramps:3},
  {id:5,name:'Улица',goal:145,theme:'city',coins:8,tramps:3},
  {id:6,name:'Крыши',goal:170,theme:'city',coins:9,tramps:4},
  {id:7,name:'Пляж',goal:195,theme:'beach',coins:10,tramps:4},
  {id:8,name:'Побережье',goal:220,theme:'beach',coins:11,tramps:5},
  {id:9,name:'Закат',goal:250,theme:'beach',coins:12,tramps:5},
  {id:10,name:'Небоскрёбы',goal:280,theme:'city',coins:13,tramps:6},
  {id:11,name:'Мост',goal:310,theme:'city',coins:14,tramps:6},
  {id:12,name:'Космодром',goal:340,theme:'space',coins:15,tramps:7},
  {id:13,name:'Орбита',goal:370,theme:'space',coins:16,tramps:7},
  {id:14,name:'Луна',goal:400,theme:'space',coins:18,tramps:8},
  {id:15,name:'Галактика',goal:450,theme:'space',coins:20,tramps:9},
];

const THEMES={
  park:{sky1:0x87CEEB,sky2:0xE0F4FF,ground:0x7CB342,dirt:0x8D6E63,hill:0x66BB6A},
  city:{sky1:0x90A4AE,sky2:0xCFD8DC,ground:0x90A4AE,dirt:0x607D8B,hill:0x78909C},
  beach:{sky1:0x4FC3F7,sky2:0xB3E5FC,ground:0xFFF176,dirt:0xFFCC80,hill:0xFFD54F},
  space:{sky1:0x1A237E,sky2:0x4527A0,ground:0x5E35B1,dirt:0x311B92,hill:0x7E57C2},
};

function loadSave(){
  try{return JSON.parse(localStorage.getItem(SAVE))||{unlocked:1,stars:{}};}catch(e){return{unlocked:1,stars:{}};}
}
function writeSave(s){localStorage.setItem(SAVE,JSON.stringify(s));}

const Sfx=(()=>{
  let ctx=null;
  const ac=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;};
  const tone=(f,d=.1,t='sine',v=.12)=>{try{const c=ac(),n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+d);}catch(e){}};
  return{
    fire:()=>{tone(200,.15,'square');tone(100,.2,'sawtooth',.08);},
    bounce:()=>tone(440,.07,'triangle'),
    coin:()=>{tone(880,.05);tone(1200,.07,.08);},
    fart:()=>{tone(110,.18,'sawtooth');},
    win:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.12),i*85)),
    lose:()=>{tone(200,.25,'sawtooth');setTimeout(()=>tone(150,.3,'sawtooth',.08),100);},
    ui:()=>tone(660,.04),
  };
})();

function makeTex(scene,key,w,h,draw){
  if(scene.textures.exists(key))return;
  const g=scene.make.graphics({add:false});
  draw(g,w,h);g.generateTexture(key,w,h);g.destroy();
}

function bootTextures(scene){
  makeTex(scene,'granny',80,80,(g)=>{
    g.fillStyle(0x3E2723);g.fillCircle(40,42,36);
    g.fillStyle(0xFFCCBC);g.fillCircle(40,40,30);
    g.fillStyle(0xB0BEC5);g.fillCircle(40,22,24);
    g.fillStyle(0x222);g.fillCircle(32,40,4);g.fillCircle(48,40,4);
    g.fillStyle(0xE91E63);g.fillRoundedRect(20,52,40,22,8);
    g.fillStyle(0xC62828);g.fillTriangle(26,50,54,50,40,62);
  });
  makeTex(scene,'cannon',100,90,(g)=>{
    g.fillStyle(0x4E342E);g.fillRoundedRect(6,62,88,22,6);
    g.fillStyle(0x546E7A);g.fillRoundedRect(34,10,32,56,8);
    g.fillStyle(0xFFB300);g.fillCircle(50,10,14);
    g.fillStyle(0x333);g.fillCircle(50,10,6);
  });
  makeTex(scene,'tramp',96,40,(g)=>{
    g.fillStyle(0x5D4037);g.fillRoundedRect(4,30,88,8,3);
    g.fillStyle(0x00E676);g.fillEllipse(48,18,42,14);
    g.lineStyle(2,0x00C853);g.strokeEllipse(48,18,42,14);
  });
  makeTex(scene,'coin',32,32,(g)=>{
    g.fillStyle(0xF9A825);g.fillCircle(16,16,15);
    g.fillStyle(0xFFEB3B);g.fillCircle(16,16,12);
    g.fillStyle(0xFFF9C4);g.fillEllipse(12,12,5,4);
  });
  makeTex(scene,'flag',48,80,(g)=>{
    g.fillStyle(0x795548);g.fillRect(22,10,4,70);
    g.fillStyle(0xE53935);g.fillTriangle(26,10,46,20,26,30);
    g.fillStyle(0x43A047);g.fillRect(18,76,12,4);
  });
  makeTex(scene,'cloud',80,40,(g)=>{
    g.fillStyle(0xFFF);
    g.fillEllipse(25,25,22,16);g.fillEllipse(45,22,26,18);g.fillEllipse(60,26,20,14);
  });
  makeTex(scene,'tree',48,72,(g)=>{
    g.fillStyle(0x5D4037);g.fillRoundedRect(20,48,8,24,2);
    g.fillStyle(0x388E3C);g.fillCircle(24,32,22);
  });
  makeTex(scene,'spark',8,8,(g)=>{g.fillStyle(0xFFF);g.fillCircle(4,4,4);});
}

class Boot extends Phaser.Scene{
  constructor(){super('Boot');}
  preload(){
    this.load.on('loaderror',f=>console.warn('asset',f&&f.key));
    this.load.image('granny_hd',ASSET_BASE+'assets/granny.png');
    this.load.image('cannon_hd',ASSET_BASE+'assets/cannon.png');
  }
  create(){
    bootTextures(this);
    this.scene.start('Menu');
  }
}

class Menu extends Phaser.Scene{
  constructor(){super('Menu');}
  create(){
    const t=THEMES.park;
    const bg=this.add.graphics();
    bg.fillGradientStyle(t.sky1,t.sky1,t.sky2,t.sky2,1);bg.fillRect(0,0,W,H);
    for(let i=0;i<3;i++)this.add.image(120+i*200,100+i*20,'cloud').setAlpha(.6).setScale(.9);
    this.add.text(W/2,130,'БАБКА НА\nПУШКЕ',{fontFamily:FF,fontSize:'50px',fontStyle:'bold',color:'#fff',stroke:'#C62828',strokeThickness:7,align:'center'}).setOrigin(.5);
    const tex=this.textures.exists('granny_hd')?'granny_hd':'granny';
    const hero=this.add.image(W/2,H*.42,tex).setScale(tex==='granny_hd'?.22:2).setDepth(2);
    this.tweens.add({targets:hero,y:hero.y-10,duration:1200,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    const ctex=this.textures.exists('cannon_hd')?'cannon_hd':'cannon';
    this.add.image(W/2+40,H*.55,ctex).setScale(ctex==='cannon_hd'?.18:1.4).setAngle(-6);
    this.btn(W/2,H-270,'▶  ИГРАТЬ',0x43A047,()=>this.scene.start('Game',{level:1}));
    this.btn(W/2,H-180,'⭐  УРОВНИ',0x1E88E5,()=>this.scene.start('Levels'));
    const s=loadSave();
    const stars=Object.values(s.stars).reduce((a,b)=>a+b,0);
    this.add.text(W/2,H-90,`Звёзд: ${stars}  •  Открыто ${s.unlocked}/${LEVELS.length}`,{fontFamily:FF,fontSize:'20px',color:'#fff'}).setOrigin(.5);
  }
  btn(x,y,t,col,fn){
    const r=this.add.rectangle(x,y,270,68,col).setStrokeStyle(4,0x263238).setDepth(10).setInteractive({useHandCursor:true});
    const tx=this.add.text(x,y,t,{fontFamily:FF,fontSize:'26px',color:'#fff',fontStyle:'bold'}).setOrigin(.5).setDepth(11);
    r.on('pointerdown',()=>{Sfx.ui();fn();});
  }
}

class Levels extends Phaser.Scene{
  constructor(){super('Levels');}
  create(){
    const t=THEMES.park;
    this.add.graphics().fillGradientStyle(t.sky1,t.sky1,t.sky2,t.sky2,1).fillRect(0,0,W,H);
    this.add.text(W/2,65,'УРОВНИ',{fontFamily:FF,fontSize:'34px',color:'#fff',stroke:'#263238',strokeThickness:4}).setOrigin(.5);
    const save=loadSave(),cols=3,sw=200,sh=120,gap=14;
    const sx=(W-(cols*sw+(cols-1)*gap))/2+sw/2,sy=140;
    LEVELS.forEach((lv,i)=>{
      const x=sx+(i%cols)*(sw+gap),y=sy+((i/cols)|0)*(sh+gap);
      const locked=lv.id>save.unlocked;
      const st=save.stars[lv.id]||0;
      const r=this.add.rectangle(x,y,sw,sh,locked?0x757575:0x43A047).setStrokeStyle(3,0x263238).setDepth(5);
      this.add.text(x,y-28,lv.id,{fontFamily:FF,fontSize:'28px',color:'#fff'}).setOrigin(.5);
      this.add.text(x,y+2,lv.name,{fontSize:'17px',color:'#fff'}).setOrigin(.5);
      this.add.text(x,y+28,`🎯 ${lv.goal} м`,{fontSize:'15px',color:'#E8F5E9'}).setOrigin(.5);
      if(locked)this.add.text(x,y,'🔒',{fontSize:'32px'}).setOrigin(.5);
      else{
        this.add.text(x,y+48,'⭐'.repeat(st)+'☆'.repeat(3-st),{fontSize:'14px'}).setOrigin(.5);
        r.setInteractive({useHandCursor:true}).on('pointerdown',()=>{Sfx.ui();this.scene.start('Game',{level:lv.id});});
      }
    });
    const back=this.add.text(W/2,H-55,'← Меню',{fontFamily:FF,fontSize:'22px',color:'#fff',backgroundColor:'#455A64',padding:{x:18,y:8}}).setOrigin(.5).setInteractive({useHandCursor:true});
    back.on('pointerdown',()=>this.scene.start('Menu'));
  }
}

// ═══════════════════════════════════════════════════════════════
//  ИГРА — слингшот + Matter.js, одно тело, чёткая логика
// ═══════════════════════════════════════════════════════════════
class Game extends Phaser.Scene{
  constructor(){super('Game');}
  init(d){this.lvId=d.level||1;this.lv=LEVELS.find(l=>l.id===this.lvId)||LEVELS[0];}

  create(){
    this.phase='aim';          // aim | fly | settle | end
    this.drag=false;this.pull=0;this.pullAng=0;
    this.maxDist=0;this.coins=0;this.fartUsed=false;
    this.settleMs=0;this.flyMs=0;
    this.theme=THEMES[this.lv.theme];
    this.finishX=CX+this.lv.goal*PX_PER_M;
    this.worldW=this.finishX+600;

    this.buildWorld();

    const ctex=this.textures.exists('cannon_hd')?'cannon_hd':'cannon';
    this.cannon=this.add.image(CX,CY,ctex).setOrigin(.5,.85).setDepth(20).setScale(ctex==='cannon_hd'?.2:1.1);
    this.sling=this.add.graphics().setDepth(25);
    this.aimDot=this.add.circle(0,0,12,0xFF6F00,.5).setDepth(26).setVisible(false);

    this.cameras.main.setBounds(0,0,this.worldW,H);
    this.cameras.main.scrollX=0;

    this.mkHud();
    this.input.setTopOnly(false);
    this.input.on('pointerdown',this.onDown,this);
    this.input.on('pointermove',this.onMove,this);
    this.input.on('pointerup',this.onUp,this);
    this.matter.world.on('collisionstart',this.onCollide,this);

    this.tutorial=this.add.text(W/2,H-80,'Тяни от пушки и отпусти!',{fontFamily:FF,fontSize:'22px',color:'#fff',stroke:'#000',strokeThickness:4}).setOrigin(.5).setScrollFactor(0).setDepth(100);
  }

  mkHud(){
    const d=0,f=0;
    this.hudGoal=this.add.text(W/2,16,`Финиш: ${this.lv.goal} м`,{fontFamily:FF,fontSize:'22px',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(.5).setScrollFactor(f).setDepth(d);
    this.hudDist=this.add.text(16,50,'0 м',{fontFamily:FF,fontSize:'28px',color:'#fff',stroke:'#000',strokeThickness:4}).setScrollFactor(f).setDepth(d);
    this.hudBest=this.add.text(16,88,`Рекорд: 0 м`,{fontFamily:FF,fontSize:'18px',color:'#FFEB3B',stroke:'#000',strokeThickness:3}).setScrollFactor(f).setDepth(d);
    this.hudCoin=this.add.text(W-16,50,'🪙 0',{fontFamily:FF,fontSize:'22px',color:'#FFEB3B',stroke:'#000',strokeThickness:3}).setOrigin(1,0).setScrollFactor(f).setDepth(d);
    this.hudLv=this.add.text(W-16,16,`${this.lv.id}. ${this.lv.name}`,{fontFamily:FF,fontSize:'18px',color:'#fff',stroke:'#000',strokeThickness:2}).setOrigin(1,0).setScrollFactor(f).setDepth(d);
    this.btnFart=this.add.text(W-16,H-90,'💨 Пук',{fontFamily:FF,fontSize:'22px',color:'#A5D6A7',stroke:'#000',strokeThickness:3,backgroundColor:'#33691E',padding:{x:12,y:6}}).setOrigin(1,.5).setScrollFactor(f).setDepth(d).setInteractive().setVisible(false);
    this.btnFart.on('pointerdown',e=>{e.stopPropagation();this.fart();});
    this.powerBg=this.add.rectangle(CX,CY-90,140,16,0x000,.35).setScrollFactor(f).setDepth(d);
    this.powerBar=this.add.rectangle(CX-70,CY-90,0,16,0x43A047).setOrigin(0,.5).setScrollFactor(f).setDepth(d);
  }

  buildWorld(){
    const t=this.theme;
    const sky=this.add.graphics().setDepth(0);
    sky.fillGradientStyle(t.sky1,t.sky1,t.sky2,t.sky2,1);sky.fillRect(0,0,this.worldW,GY+80);

    for(let i=0;i<Math.ceil(this.worldW/300);i++)
      this.add.image(80+i*300,GY-40,'tree').setDepth(2).setOrigin(.5,1).setScale(.8+Math.random()*.3).setScrollFactor(.3);
    for(let i=0;i<Math.ceil(this.worldW/500);i++)
      this.add.image(200+i*500,120,'cloud').setDepth(1).setAlpha(.5).setScrollFactor(.08);

    const ground=this.add.graphics().setDepth(3);
    ground.fillStyle(t.dirt);ground.fillRect(0,GY+8,this.worldW,80);
    ground.fillStyle(t.ground);ground.fillRect(0,GY-8,this.worldW,16);

    this.matter.add.rectangle(this.worldW/2,GY+30,this.worldW,60,{isStatic:true,label:'ground',friction:.85,restitution:.12});

    this.add.image(this.finishX,GY-40,'flag').setOrigin(.5,1).setDepth(4);
    this.add.text(this.finishX,GY-95,'ФИНИШ',{fontFamily:FF,fontSize:'18px',color:'#E53935',stroke:'#fff',strokeThickness:3}).setOrigin(.5).setDepth(4);

    this.props=[];
    this.placeProps();
  }

  placeProps(){
    const n=this.lv.tramps,step=(this.finishX-CX-200)/Math.max(n,1);
    for(let i=0;i<n;i++){
      const x=CX+180+i*step+Phaser.Math.Between(-40,40);
      const y=GY-6;
      const b=this.matter.add.rectangle(x,y,90,14,{isStatic:true,label:'tramp',friction:.2,restitution:1.35});
      const s=this.add.image(x,y,'tramp').setDepth(5);
      this.props.push({kind:'tramp',body:b,spr:s});
    }
    const coinN=this.lv.coins;
    for(let i=0;i<coinN;i++){
      const x=CX+120+((this.finishX-CX-100)*i/Math.max(coinN-1,1))+Phaser.Math.Between(-30,30);
      const y=Phaser.Math.Between(GY-180,GY-70);
      const b=this.matter.add.circle(x,y,16,{isStatic:true,isSensor:true,label:'coin'});
      const s=this.add.image(x,y,'coin').setDepth(6);
      this.tweens.add({targets:s,y:y-6,duration:500,yoyo:true,repeat:-1});
      this.props.push({kind:'coin',body:b,spr:s,got:false});
    }
  }

  muzzle(){
    const a=Phaser.Math.DegToRad(this.cannon.angle-90);
    return{x:CX+Math.cos(a)*BARREL,y:CY+Math.sin(a)*BARREL};
  }

  worldPt(p){
    return this.cameras.main.getWorldPoint(p.x,p.y);
  }

  onDown(p){
    if(this.phase==='end')return;
    if(this.phase==='fly'){this.fart();return;}
    this.drag=true;
    this.tutorial.setVisible(false);
    this.onMove(p);
  }

  onMove(p){
    if(!this.drag||this.phase!=='aim')return;
    const w=this.worldPt(p),m=this.muzzle();
    let dx=m.x-w.x,dy=m.y-w.y;
    let d=Math.hypot(dx,dy);
    if(d<8){this.pull=0;this.drawSling(m,null);return;}
    if(d>MAX_PULL){dx*=MAX_PULL/d;dy*=MAX_PULL/d;d=MAX_PULL;}
    this.pullAng=Math.atan2(dy,dx);
    this.pull=d/MAX_PULL;
    this.cannon.setAngle(Phaser.Math.RadToDeg(this.pullAng)+90);
    this.drawSling(m,{x:m.x+dx,y:m.y+dy});
    this.powerBar.width=140*this.pull;
    this.powerBar.setFillStyle(this.pull<.45?0x43A047:this.pull<.75?0xFDD835:0xE53935);
  }

  onUp(){
    if(!this.drag||this.phase!=='aim')return;
    this.drag=false;
    this.aimDot.setVisible(false);
    if(this.pull<.05){this.sling.clear();this.powerBar.width=0;return;}
    this.fire();
  }

  drawSling(m,tail){
    const g=this.sling;g.clear();
    if(!tail){this.powerBar.width=0;return;}
    g.lineStyle(6,0xFF6F00,.9);
    g.lineBetween(m.x,m.y,tail.x,tail.y);
    g.fillStyle(0xFF6F00,.8);g.fillCircle(tail.x,tail.y,11);
    this.aimDot.setPosition(tail.x,tail.y).setVisible(true);
  }

  fire(){
    this.phase='fly';
    this.sling.clear();
    this.flyMs=0;this.settleMs=0;
    this.fartUsed=false;
    const m=this.muzzle();
    const power=18+this.pull*52;
    const vx=Math.cos(this.pullAng)*power;
    const vy=Math.sin(this.pullAng)*power;

    this.granny=this.matter.add.sprite(m.x,m.y,'granny',null,{
      shape:{type:'circle',radius:28},
      friction:.06,frictionAir:.004,restitution:.42,
      label:'granny',mass:2.2
    });
    this.granny.setDepth(30).setScale(1.05).setFixedRotation(false);
    this.matter.body.setVelocity(this.granny.body,{x:vx,y:vy});
    this.matter.body.setAngularVelocity(this.granny.body,(Math.random()-.5)*.15);

    Sfx.fire();
    this.cameras.main.startFollow(this.granny,true,.12,.12,-W*.25,-60);
    this.btnFart.setVisible(true);
    this.powerBar.width=0;
    this.cameras.main.shake(100,.006);
  }

  fart(){
    if(this.phase!=='fly'||this.fartUsed||!this.granny)return;
    this.fartUsed=true;
    this.btnFart.setVisible(false);
    Sfx.fart();
    const b=this.granny.body;
    const sp=Math.hypot(b.velocity.x,b.velocity.y)||1;
    this.matter.body.setVelocity(b,{
      x:b.velocity.x+(-b.velocity.y/sp)*14,
      y:b.velocity.y+(b.velocity.x/sp)*14-4
    });
    this.cameras.main.shake(80,.004);
  }

  onCollide(ev){
    if(!this.granny||this.phase==='end')return;
    ev.pairs.forEach(({bodyA,bodyB})=>{
      const la=bodyA.label,lb=bodyB.label;
      const isG=la==='granny'||lb==='granny';
      if(!isG)return;
      const other=la==='granny'?bodyB:bodyA;
      if(other.label==='tramp'){
        const b=this.granny.body;
        const vy=b.velocity.y;
        if(vy>1){
          this.matter.body.setVelocity(b,{x:b.velocity.x*1.08,y:-Math.max(16,Math.abs(vy)*1.25)});
          Sfx.bounce();
          this.cameras.main.shake(80,.005);
          const pr=this.props.find(p=>p.body===other);
          if(pr)this.tweens.add({targets:pr.spr,scaleY:.6,scaleX:1.1,duration:70,yoyo:true});
        }
      }
      if(other.label==='coin'){
        const pr=this.props.find(p=>p.body===other&&!p.got);
        if(pr){
          pr.got=true;this.coins++;
          Sfx.coin();
          this.hudCoin.setText('🪙 '+this.coins);
          this.tweens.add({targets:pr.spr,scale:1.6,alpha:0,duration:150,onComplete:()=>{pr.spr.destroy();this.matter.world.remove(pr.body);}});
        }
      }
    });
  }

  distM(){return this.granny?Math.max(0,Math.floor((this.granny.x-CX)/PX_PER_M)):0;}

  speed(){
    if(!this.granny)return 0;
    const v=this.granny.body.velocity;
    return Math.hypot(v.x,v.y);
  }

  onGround(){
    if(!this.granny)return false;
    return this.granny.y>=GY-35&&Math.abs(this.granny.body.velocity.y)<3;
  }

  calcStars(){
    const d=this.maxDist,g=this.lv.goal;
    let s=1;
    if(d>=g*1.1)s=2;
    if(d>=g*1.2&&this.coins>=Math.ceil(this.lv.coins*.6))s=3;
    return s;
  }

  win(){
    if(this.phase==='end')return;
    this.phase='end';
    this.matter.world.pause();
    this.cameras.main.stopFollow();
    Sfx.win();
    const stars=this.calcStars();
    const save=loadSave();
    if(this.lv.id>=save.unlocked&&this.lv.id<LEVELS.length)save.unlocked=this.lv.id+1;
    if(stars>(save.stars[this.lv.id]||0))save.stars[this.lv.id]=stars;
    writeSave(save);
    this.showEnd(true,stars);
  }

  lose(reason){
    if(this.phase==='end')return;
    this.phase='end';
    this.matter.world.pause();
    this.cameras.main.stopFollow();
    Sfx.lose();
    this.showEnd(false,0,reason);
  }

  showEnd(ok,stars,reason){
    const cx=W/2;
    this.add.rectangle(cx,H/2,W,H,0x000,.75).setScrollFactor(0).setDepth(200);
    const title=this.add.text(cx,H*.32,ok?'ПОБЕДА!':'Не долетела',{fontFamily:FF,fontSize:ok?'44px':'36px',color:ok?'#FFD54F':'#EF5350',stroke:'#263238',strokeThickness:5}).setOrigin(.5).setScrollFactor(0).setDepth(201);
    this.add.text(cx,H*.32+55,`${this.maxDist} / ${this.lv.goal} м`,{fontFamily:FF,fontSize:'24px',color:'#fff'}).setOrigin(.5).setScrollFactor(0).setDepth(201);
    if(ok)this.add.text(cx,H*.32+90,'⭐'.repeat(stars)+'☆'.repeat(3-stars),{fontSize:'36px'}).setOrigin(.5).setScrollFactor(0).setDepth(201);
    else if(reason)this.add.text(cx,H*.32+90,reason,{fontFamily:FF,fontSize:'18px',color:'#B0BEC5'}).setOrigin(.5).setScrollFactor(0).setDepth(201);
    this.endBtn(cx,H*.55,'Заново',0xFB8C00,()=>this.scene.start('Game',{level:this.lv.id}));
    if(ok&&this.lv.id<LEVELS.length)this.endBtn(cx,H*.55+70,'Дальше →',0x43A047,()=>this.scene.start('Game',{level:this.lv.id+1}));
    this.endBtn(cx,H*.55+(ok&&this.lv.id<LEVELS.length?140:70),'Уровни',0x1E88E5,()=>this.scene.start('Levels'));
    this.endBtn(cx,H*.55+(ok&&this.lv.id<LEVELS.length?210:140),'Меню',0x78909C,()=>this.scene.start('Menu'));
  }

  endBtn(x,y,t,col,fn){
    const r=this.add.rectangle(x,y,260,56,col).setStrokeStyle(3,0x263238).setScrollFactor(0).setDepth(202).setInteractive({useHandCursor:true});
    this.add.text(x,y,t,{fontFamily:FF,fontSize:'22px',color:'#fff'}).setOrigin(.5).setScrollFactor(0).setDepth(203);
    r.on('pointerdown',()=>{Sfx.ui();fn();});
  }

  update(_t,delta){
    if(this.phase==='end'||!this.granny)return;

    const d=this.distM();
    if(d>this.maxDist)this.maxDist=d;
    this.hudDist.setText(d+' м');
    this.hudBest.setText(`Рекорд: ${this.maxDist} м`);

    if(this.phase==='fly'){
      this.flyMs+=delta;

      if(this.granny.x>=this.finishX){
        this.maxDist=Math.max(this.maxDist,this.lv.goal);
        this.win();
        return;
      }

      if(this.granny.y>H+100||this.flyMs>22000){
        this.lose(this.granny.y>H+100?'Улетела в бездну':'Время вышло');
        return;
      }

      const spd=this.speed();
      if(this.onGround()){
        this.settleMs+=delta;
        if(this.settleMs>1200){
          if(this.maxDist>=this.lv.goal)this.win();
          else this.lose('Остановилась раньше финиша');
        }
      }else{
        this.settleMs=0;
      }
    }
  }
}

new Phaser.Game({
  type:Phaser.AUTO,width:W,height:H,parent:'game',
  backgroundColor:'#87CEEB',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{
    default:'matter',
    matter:{
      gravity:{y:2.4},
      positionIterations:10,
      velocityIterations:8,
      enableSleeping:false
    }
  },
  scene:[Boot,Menu,Levels,Game]
});
</script>
